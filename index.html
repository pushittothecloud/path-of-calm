// Phase timing: each scene has a duration, then we auto-advance
const INTRO_PHASES = [
  { dur: 3.5, text: '' },                                            // 0: prince walks into view
  { dur: 7.0, text: 'An old man... bent by the weight of years.' },  // 1: sees old man
  { dur: 7.0, text: 'A sick man... ravaged by disease.' },           // 2: sees sick man
  { dur: 7.0, text: 'A dead man... all life extinguished.' },        // 3: sees dead man
  { dur: 8.0, text: '"This is the fate of all beings.\nI must find liberation from suffering."' }, // 4: vow
  { dur: 5.0, text: '' },                                            // 5: cuts hair
  { dur: 5.0, text: '' },                                            // 6: gives away gold
  { dur: 5.0, text: '' },                                            // 7: puts on saffron robes
  { dur: 6.0, text: 'And so he renounced the world\nand walked the path of calm.' }, // 8: final text + fade
];

function startIntro() {
  gameState = 'intro';
  introTimer = 0;
  introPhase = 0;
  introPrinceX = -40;
  introTextAlpha = 0;
  introTextTarget = '';
  spriteCache = {};
}

function updateIntro(dt) {
  introTimer += dt;

  var phase = INTRO_PHASES[introPhase];
  if (!phase) return;

  // Auto-advance phase
  if (introTimer >= phase.dur) {
    introTimer = 0;
    introPhase++;
    if (introPhase >= INTRO_PHASES.length) {
      // Intro finished — start the actual game
      introPhase = INTRO_PHASES.length - 1;
      startTransition("Level 1: Monastery Courtyard\n\"Discipline\"", function() { setupLevel(0); });
      return;
    }
    // Sound effects on phase transitions
    if (introPhase === 1 || introPhase === 2 || introPhase === 3) playSfx('step');
    if (introPhase === 4) playSfx('bell');
    if (introPhase === 5) playSfx('chop');
    if (introPhase === 6) playSfx('tempt_gold');
    if (introPhase === 7) playSfx('chime');
    if (introPhase === 8) playSfx('bell');
  }

  // Skip with spacebar — advance to next phase (or skip entire intro)
  if (interactJustPressed) {
    if (introPhase >= INTRO_PHASES.length - 1 && introTimer > 1.0) {
      startTransition("Level 1: Monastery Courtyard\n\"Discipline\"", function() { setupLevel(0); });
      return;
    }
    introTimer = phase.dur; // skip to end of current phase
  }
}

function renderIntro() {
  var cx_ = WIDTH / 2;
  var cy_ = HEIGHT / 2;
  var phase = INTRO_PHASES[introPhase];
  var t = introTimer;
  var phaseDur = phase.dur;
  var progress = Math.min(t / phaseDur, 1);

  // Dark background with ground
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Ground
  var groundY = HEIGHT - 60;
  ctx.fillStyle = PAL.dirt;
  ctx.fillRect(0, groundY, WIDTH, 60);
  ctx.fillStyle = PAL.path;
  ctx.fillRect(0, groundY, WIDTH, 4);

  // Stars in the sky
  ctx.fillStyle = '#ffffff';
  for (var si = 0; si < 30; si++) {
    var sx = ((si * 73 + 17) % WIDTH);
    var sy = ((si * 41 + 11) % (groundY - 20));
    var twinkle = Math.sin(gameTime * 2 + si * 1.3) * 0.3 + 0.7;
    ctx.globalAlpha = twinkle * 0.6;
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#d0c8a0';
  ctx.beginPath();
  ctx.arc(WIDTH - 60, 40, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a2a';
  ctx.beginPath();
  ctx.arc(WIDTH - 52, 36, 16, 0, Math.PI * 2);
  ctx.fill();

  // Prince position
  var princeY = groundY - 32;
  var princeBaseX = cx_ - 80;

  // Phase-specific rendering
  if (introPhase === 0) {
    // Prince walks in from the left
    introPrinceX = -40 + progress * (princeBaseX + 40);
    var princeSprite = getCachedSprite('intro_prince', PRINCE_SPRITE, PRINCE_PAL);
    ctx.drawImage(princeSprite, introPrinceX, princeY);
  }
  else if (introPhase === 1) {
    // Prince stops, old man visible ahead
    var princeSprite = getCachedSprite('intro_prince', PRINCE_SPRITE, PRINCE_PAL);
    ctx.drawImage(princeSprite, princeBaseX, princeY);

    // Old man
    var oldManX = cx_ + 40;
    var oldManSprite = getCachedSprite('intro_oldman', OLD_MAN_SPRITE, OLD_MAN_PAL);
    // Fade in
    ctx.globalAlpha = Math.min(t / 1.0, 1);
    ctx.drawImage(oldManSprite, oldManX, princeY);
    ctx.globalAlpha = 1;

    // Shock indicator above prince
    if (t > 1.5) {
      ctx.fillStyle = PAL.white;
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = Math.min((t - 1.5) / 0.5, 1);
      ctx.fillText('!', princeBaseX + 16, princeY - 8);
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }

    // Text
    drawIntroText(phase.text, t, 1.5);
  }
  else if (introPhase === 2) {
    // Prince, sick man on the ground
    var princeSprite = getCachedSprite('intro_prince', PRINCE_SPRITE, PRINCE_PAL);
    ctx.drawImage(princeSprite, princeBaseX, princeY);

    var sickManX = cx_ + 30;
    var sickManSprite = getCachedSprite('intro_sickman', SICK_MAN_SPRITE, SICK_MAN_PAL);
    ctx.globalAlpha = Math.min(t / 1.0, 1);
    ctx.drawImage(sickManSprite, sickManX, princeY);
    ctx.globalAlpha = 1;

    if (t > 1.5) {
      ctx.fillStyle = PAL.white;
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = Math.min((t - 1.5) / 0.5, 1);
      ctx.fillText('!', princeBaseX + 16, princeY - 8);
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }

    drawIntroText(phase.text, t, 1.5);
  }
  else if (introPhase === 3) {
    // Prince, dead man (shroud on bier)
    var princeSprite = getCachedSprite('intro_prince', PRINCE_SPRITE, PRINCE_PAL);
    ctx.drawImage(princeSprite, princeBaseX, princeY);

    var deadManX = cx_ + 30;
    var deadManSprite = getCachedSprite('intro_deadman', DEAD_MAN_SPRITE, DEAD_MAN_PAL);
    ctx.globalAlpha = Math.min(t / 1.0, 1);
    ctx.drawImage(deadManSprite, deadManX, princeY);
    ctx.globalAlpha = 1;

    // Candle flicker near bier
    if (t > 0.5) {
      ctx.fillStyle = PAL.flame;
      ctx.globalAlpha = 0.6 + Math.sin(gameTime * 8) * 0.3;
      ctx.fillRect(deadManX + 20, princeY + 14, 2, 3);
      ctx.globalAlpha = 1;
    }

    if (t > 1.5) {
      ctx.fillStyle = PAL.white;
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = Math.min((t - 1.5) / 0.5, 1);
      ctx.fillText('!', princeBaseX + 16, princeY - 8);
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }

    drawIntroText(phase.text, t, 1.5);
  }
  else if (introPhase === 4) {
    // Vow — prince stands center, determined
    var princeSprite = getCachedSprite('intro_prince', PRINCE_SPRITE, PRINCE_PAL);
    ctx.drawImage(princeSprite, cx_ - 16, princeY);

    drawIntroText(phase.text, t, 0.5);
  }
  else if (introPhase === 5) {
    // Hair cutting — flash of blade, hair falls
    var hairCutProgress = Math.min(t / 1.5, 1);

    if (hairCutProgress < 1) {
      // Show prince (still has hair)
      var princeSprite = getCachedSprite('intro_prince', PRINCE_SPRITE, PRINCE_PAL);
      ctx.drawImage(princeSprite, cx_ - 16, princeY);
    } else {
      // Show bald prince
      var baldSprite = getCachedSprite('intro_prince_bald', PRINCE_BALD_SPRITE, PRINCE_PAL);
      ctx.drawImage(baldSprite, cx_ - 16, princeY);
    }

    // Blade flash
    if (t > 0.8 && t < 1.5) {
      ctx.fillStyle = '#c0c0d0';
      ctx.globalAlpha = Math.max(0, 1 - (t - 0.8) / 0.7);
      ctx.fillRect(cx_ - 8, princeY + 2, 16, 2);
      ctx.globalAlpha = 1;
    }

    // Falling hair particles
    if (t > 1.2) {
      ctx.fillStyle = PAL.black;
      var hairT = t - 1.2;
      for (var hi = 0; hi < 6; hi++) {
        var hx = cx_ - 6 + hi * 4 + Math.sin(hairT * 3 + hi) * 3;
        var hy = princeY + 4 + hairT * 40 + hi * 5;
        if (hy < groundY) {
          ctx.fillRect(hx, hy, 2, 2);
        }
      }
    }

    // Label
    var lblAlpha = Math.min(t / 1.0, 1);
    ctx.fillStyle = 'rgba(0,0,0,' + lblAlpha * 0.6 + ')';
    ctx.fillRect(0, 32, WIDTH, 26);
    ctx.fillStyle = 'rgba(232,224,208,' + lblAlpha + ')';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('He cut away his hair...', cx_, 50);
    ctx.textAlign = 'left';
  }
  else if (introPhase === 6) {
    // Giving away gold — bald prince, coins fall away
    var baldSprite = getCachedSprite('intro_prince_bald', PRINCE_BALD_SPRITE, PRINCE_PAL);
    ctx.drawImage(baldSprite, cx_ - 16, princeY);

    // Coins scattering/falling
    var coinAlpha = Math.max(0, 1 - progress);
    ctx.globalAlpha = coinAlpha;
    var coinSprite = getCachedSprite('intro_coins', COINS_SPRITE, COINS_PAL);
    for (var ci = 0; ci < 5; ci++) {
      var coinX = cx_ + 20 + ci * 14 + t * 20 * (ci % 2 === 0 ? 1 : -0.5);
      var coinY = princeY + 16 + t * 30 + ci * 8;
      if (coinY < groundY + 20) {
        ctx.drawImage(coinSprite, coinX, coinY);
      }
    }
    ctx.globalAlpha = 1;

    var lblAlpha2 = Math.min(t / 0.8, 1);
    ctx.fillStyle = 'rgba(0,0,0,' + lblAlpha2 * 0.6 + ')';
    ctx.fillRect(0, 32, WIDTH, 26);
    ctx.fillStyle = 'rgba(232,224,208,' + lblAlpha2 + ')';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('...gave away all his wealth...', cx_, 50);
    ctx.textAlign = 'left';
  }
  else if (introPhase === 7) {
    // Saffron robes — monk sprite (the actual player character)
    var monkSprite = getCachedSprite('intro_monk', MONK_DOWN_1, MONK_PAL);

    // Fade from blue robes to saffron
    if (t < 1.0) {
      var baldSprite = getCachedSprite('intro_prince_bald', PRINCE_BALD_SPRITE, PRINCE_PAL);
      ctx.globalAlpha = 1 - t / 1.0;
      ctx.drawImage(baldSprite, cx_ - 16, princeY);
      ctx.globalAlpha = t / 1.0;
      ctx.drawImage(monkSprite, cx_ - 16, princeY);
      ctx.globalAlpha = 1;
    } else {
      ctx.drawImage(monkSprite, cx_ - 16, princeY);
    }

    var lblAlpha3 = Math.min(t / 0.8, 1);
    ctx.fillStyle = 'rgba(0,0,0,' + lblAlpha3 * 0.6 + ')';
    ctx.fillRect(0, 32, WIDTH, 26);
    ctx.fillStyle = 'rgba(232,224,208,' + lblAlpha3 + ')';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('...and took the saffron robe.', cx_, 50);
    ctx.textAlign = 'left';
  }
  else if (introPhase === 8) {
    // Final — monk stands, text fades in, then fade to black
    var monkSprite = getCachedSprite('intro_monk', MONK_DOWN_1, MONK_PAL);
    var fadeOut = (t > 3.5) ? Math.min((t - 3.5) / 2.0, 1) : 0;

    ctx.globalAlpha = 1 - fadeOut;
    ctx.drawImage(monkSprite, cx_ - 16, princeY);
    ctx.globalAlpha = 1;

    drawIntroText(phase.text, t, 0.3);

    // Fade to black
    if (fadeOut > 0) {
      ctx.fillStyle = 'rgba(0,0,0,' + fadeOut + ')';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
    }
  }

  // "Press SPACE to skip" hint
  if (introPhase < INTRO_PHASES.length - 1) {
    ctx.fillStyle = 'rgba(184,176,160,' + (Math.sin(gameTime * 3) > 0 ? 0.35 : 0.15) + ')';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SPACE to skip', WIDTH - 10, HEIGHT - 8);
    ctx.textAlign = 'left';
  }
}

function drawIntroText(text, t, delay) {
  if (!text || t < delay) return;
  var alpha = Math.min((t - delay) / 1.0, 1);
  var lines = text.split('\n');
  var lineH = 22;
  var textY = 50;
  // Dark backdrop behind text for readability
  ctx.fillStyle = 'rgba(0,0,0,' + alpha * 0.6 + ')';
  ctx.fillRect(0, textY - 18, WIDTH, lines.length * lineH + 12);
  ctx.fillStyle = 'rgba(232,224,208,' + alpha + ')';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  for (var li = 0; li < lines.length; li++) {
    ctx.fillText(lines[li], WIDTH / 2, textY + li * lineH);
  }
  ctx.textAlign = 'left';
}

// ======================================================================
// RENDER
// ======================================================================

function render() {
  ctx.clearRect(0, 0, WIDTH, HEIGHT);

  if (gameState === 'title') {
    renderTitle();
    return;
  }

  if (gameState === 'intro') {
    renderIntro();
    return;
  }

  if (gameState === 'ending') {
    renderEnding();
    return;
  }

  if (gameState === 'succumbing') {
    renderSuccumbing();
    return;
  }

  if (gameState === 'reincarnation') {
    renderReincarnation();
    return;
  }

  if (gameState === 'cessation') {
    renderCessation();
    return;
  }

  // Abstract levels (no tile map) use custom renderers
  if (currentLevel >= 3) {
    renderAbstractLevel();
    renderCravingMeter();
    if (gameState === 'dialogue' && dialogueText) renderDialogue(dialogueText);
    if (transitionAlpha > 0) renderTransition();
    return;
  }

  // Apply screen shake from temptation effects
  if (temptScreenShake > 0) {
    ctx.save();
    ctx.translate(
      (Math.random() - 0.5) * temptScreenShake * 10,
      (Math.random() - 0.5) * temptScreenShake * 10
    );
  }

  // Draw map
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map[y].length; x++) {
      const ch = map[y][x];
      const tileType = TILE_MAP[ch];
      if (tileType) {
        drawTile(ctx, x, y, tileType);
      } else if (ch === 'e') {
        drawTile(ctx, x, y, 'stone');
      } else if (ch === 'f') {
        // Forest edge filler (solid, dark)
        ctx.fillStyle = PAL.forestD;
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      } else if (ch === 'h') {
        ctx.fillStyle = PAL.black;
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      } else {
        drawTile(ctx, x, y, 'grass');
      }
    }
  }

  // Enlightened warm overlay on tile-based levels
  if (enlightened && currentLevel <= 2) {
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#ffe0a0';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.globalAlpha = 1;
  }

  // Draw entities
  for (const e of entities) {
    if (!e.active) continue;

    if (e.type === 'wood') {
      if (!e.chopped) {
        // Unchopped — stacked log pile
        ctx.fillStyle = PAL.bark;
        ctx.fillRect(e.x + 4, e.y + 18, 24, 8);
        ctx.fillRect(e.x + 6, e.y + 12, 20, 8);
        ctx.fillRect(e.x + 8, e.y + 6, 16, 8);
        // Log end circles
        ctx.fillStyle = PAL.wood;
        ctx.fillRect(e.x + 4, e.y + 20, 6, 4);
        ctx.fillRect(e.x + 22, e.y + 20, 6, 4);
        ctx.fillRect(e.x + 8, e.y + 14, 6, 4);
        ctx.fillRect(e.x + 18, e.y + 14, 6, 4);
        // Axe leaning against pile
        ctx.fillStyle = PAL.brownD;
        ctx.fillRect(e.x + 26, e.y + 10, 2, 14);
        ctx.fillStyle = PAL.stoneD;
        ctx.fillRect(e.x + 24, e.y + 8, 6, 4);
        // Prompt when near
        if (dist(player, e) < 50) {
          ctx.fillStyle = PAL.gold;
          ctx.font = '8px monospace';
          ctx.fillText('Chop', e.x + 8, e.y);
        }
      } else {
        // Chopped — split pieces scattered on ground
        // Animate a brief bounce on chop
        if (e.chopAnim > 0) e.chopAnim = Math.max(0, e.chopAnim - 0.03);
        const bounce = Math.sin(e.chopAnim * Math.PI * 3) * e.chopAnim * 4;
        // Left split half
        ctx.fillStyle = PAL.bark;
        ctx.fillRect(e.x + 2, e.y + 22 - bounce, 10, 6);
        ctx.fillStyle = PAL.wood;
        ctx.fillRect(e.x + 2, e.y + 23 - bounce, 4, 4);
        // Right split half
        ctx.fillStyle = PAL.bark;
        ctx.fillRect(e.x + 18, e.y + 20 - bounce, 10, 6);
        ctx.fillStyle = PAL.wood;
        ctx.fillRect(e.x + 24, e.y + 21 - bounce, 4, 4);
        // Small chips
        ctx.fillStyle = PAL.bark;
        ctx.fillRect(e.x + 12, e.y + 24, 4, 3);
        ctx.fillRect(e.x + 8, e.y + 26, 3, 2);
        ctx.fillRect(e.x + 20, e.y + 26, 3, 2);
        // Stump remnant
        ctx.fillStyle = PAL.barkD;
        ctx.fillRect(e.x + 10, e.y + 20, 8, 6);
        ctx.fillStyle = PAL.wood;
        ctx.fillRect(e.x + 11, e.y + 20, 6, 2);
        // Checkmark
        ctx.fillStyle = PAL.green;
        ctx.font = '8px monospace';
        ctx.fillText('✓', e.x + 13, e.y + 8);
      }
    }

    if (e.type === 'npc_elder') {
      const sprite = getCachedSprite('elder', NPC_ELDER, NPC_PAL);
      ctx.drawImage(sprite, e.x, e.y);
      if (dist(player, e) < 50) {
        ctx.fillStyle = PAL.gold;
        ctx.fillRect(e.x + 12, e.y - 8, 8, 8);
        ctx.fillStyle = PAL.goldD;
        ctx.fillRect(e.x + 14, e.y - 6, 4, 4);
      }
    }

    if (e.type === 'villager') {
      const sprite = getCachedSprite('villager_'+e.id, VILLAGER_SPRITE, VILLAGER_PAL);
      ctx.drawImage(sprite, e.x, e.y);
      if (dist(player, e) < 50 && !e.givenAlms) {
        ctx.fillStyle = PAL.gold;
        ctx.fillRect(e.x + 12, e.y - 8, 8, 8);
      }
      if (e.givenAlms) {
        ctx.fillStyle = PAL.green;
        ctx.fillRect(e.x + 12, e.y - 6, 8, 2);
      }
    }

    if (e.type === 'distraction') {
      const dd = dist(player, e);
      const rad = e.radius || 80;
      const pulse = Math.sin(gameTime * (e.pulseSpeed || 4)) * 0.3 + 0.7;
      const color = e.color || PAL.red;

      // Emanating rings when player is near — alluring visual pull
      if (dd < rad * 1.5) {
        const ringCount = 3;
        for (let r = 0; r < ringCount; r++) {
          const ringPhase = ((gameTime * 1.5 + r * 0.8) % 2) / 2;
          const ringR = 8 + ringPhase * 32;
          ctx.globalAlpha = (1 - ringPhase) * 0.25;
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(e.x + 16, e.y + 16, ringR, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      ctx.globalAlpha = pulse;
      // Draw character/object based on dtype
      if (e.dtype === 'lady') {
        // Woman — villager-sized (32x32), styled like succumbing animation
        // Dark flowing hair
        ctx.fillStyle = '#1a0a0a';
        ctx.fillRect(e.x+6,e.y+0,20,8);
        ctx.fillRect(e.x+4,e.y+4,24,10);
        // Face
        ctx.fillStyle = '#ddb888';
        ctx.fillRect(e.x+10,e.y+2,12,10);
        // Eyes — beckoning green
        ctx.fillStyle = '#2a4a1a';
        ctx.fillRect(e.x+12,e.y+5,3,2);
        ctx.fillRect(e.x+18,e.y+5,3,2);
        // Red lips
        ctx.fillStyle = '#dd2020';
        ctx.fillRect(e.x+13,e.y+9,6,2);
        // Neck
        ctx.fillStyle = '#ddb888';
        ctx.fillRect(e.x+14,e.y+12,4,2);
        // Red dress
        ctx.fillStyle = '#cc2020';
        ctx.fillRect(e.x+8,e.y+14,16,14);
        ctx.fillStyle = '#ddb888';
        ctx.fillRect(e.x+13,e.y+14,6,3);
        // Arms
        ctx.fillStyle = '#ddb888';
        ctx.fillRect(e.x+4,e.y+16,4,6);
        ctx.fillRect(e.x+24,e.y+16,4,6);
        // Legs
        ctx.fillStyle = '#ddb888';
        ctx.fillRect(e.x+10,e.y+28,4,4);
        ctx.fillRect(e.x+18,e.y+28,4,4);
        // Subtle sway
        var sway = Math.sin(gameTime * 2) * 0.5;
        ctx.fillStyle = '#cc2020';
        ctx.fillRect(e.x+8+sway,e.y+22,16,1);
      } else if (e.dtype === 'angulimala') {
        // Head - angry face
        ctx.fillStyle = '#6b4a2a';
        ctx.fillRect(e.x+10,e.y+2,12,10);
        // Angry eyes (red)
        ctx.fillStyle = '#cc2020';
        ctx.fillRect(e.x+12,e.y+4,3,3);
        ctx.fillRect(e.x+19,e.y+4,3,3);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(e.x+13,e.y+5,1,1);
        ctx.fillRect(e.x+20,e.y+5,1,1);
        // Angry brows
        ctx.fillRect(e.x+11,e.y+3,4,1);
        ctx.fillRect(e.x+18,e.y+3,4,1);
        // Snarling teeth
        ctx.fillStyle = '#e8e0d0';
        ctx.fillRect(e.x+14,e.y+9,4,2);
        // Dark robes
        ctx.fillStyle = '#2a2020';
        ctx.fillRect(e.x+8,e.y+12,16,12);
        ctx.fillStyle = '#3a2a2a';
        ctx.fillRect(e.x+10,e.y+14,12,8);
        // Sword in right hand
        ctx.fillStyle = '#888';
        ctx.fillRect(e.x+26,e.y+6,2,18);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(e.x+26,e.y+4,2,4);
        // Finger necklace — gruesome string of severed fingers
        ctx.fillStyle = '#b08860';
        // String across chest
        ctx.fillRect(e.x+8,e.y+11,16,1);
        // Individual fingers hanging from the necklace
        for (let fi=0;fi<7;fi++) {
          ctx.fillStyle = '#d4a570';
          ctx.fillRect(e.x+8+fi*2.2,e.y+11,2,4);
          ctx.fillStyle = '#c09060';
          ctx.fillRect(e.x+8+fi*2.2,e.y+14,2,1);
        }
        // Legs
        ctx.fillStyle = '#4a3020';
        ctx.fillRect(e.x+12,e.y+24,3,6);
        ctx.fillRect(e.x+18,e.y+24,3,6);
      } else if (e.dtype === 'gold') {
        // Wooden platform
        ctx.fillStyle = '#8b6b3a';
        ctx.fillRect(e.x+4,e.y+24,24,6);
        // Stacked gold bars
        ctx.fillStyle = '#e8c840';
        ctx.fillRect(e.x+6,e.y+18,20,8);
        ctx.fillRect(e.x+8,e.y+12,16,8);
        ctx.fillRect(e.x+10,e.y+8,12,6);
        // Highlights
        ctx.fillStyle = '#fff8c0';
        ctx.fillRect(e.x+12,e.y+14,4,2);
        ctx.fillRect(e.x+8,e.y+20,3,2);
        ctx.fillRect(e.x+20,e.y+22,3,2);
        // Coins
        ctx.fillStyle = '#c8a020';
        ctx.beginPath(); ctx.arc(e.x+6,e.y+28,3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(e.x+26,e.y+26,3,0,Math.PI*2); ctx.fill();
        // Sparkle
        if (Math.sin(gameTime*6+e.x)>0.5) {
          ctx.fillStyle='#ffffff';
          ctx.fillRect(e.x+14,e.y+10,2,2);
        }
      } else if (e.dtype === 'food') {
        // Table
        ctx.fillStyle = '#8b6b3a';
        ctx.fillRect(e.x+2,e.y+20,28,8);
        ctx.fillStyle = '#6b4a2a';
        ctx.fillRect(e.x+4,e.y+28,4,4);
        ctx.fillRect(e.x+24,e.y+28,4,4);
        // Rice bowl
        ctx.fillStyle = '#6b4a2a';
        ctx.fillRect(e.x+4,e.y+14,10,8);
        ctx.fillStyle = '#e8e0d0';
        ctx.fillRect(e.x+5,e.y+14,8,5);
        // Curry bowl
        ctx.fillStyle = '#6b4a2a';
        ctx.fillRect(e.x+16,e.y+14,10,8);
        ctx.fillStyle = '#c87040';
        ctx.fillRect(e.x+17,e.y+14,8,5);
        // Fruits
        ctx.fillStyle = '#cc3030';
        ctx.beginPath(); ctx.arc(e.x+8,e.y+10,3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#e8c840';
        ctx.beginPath(); ctx.arc(e.x+16,e.y+10,3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#3a8b3a';
        ctx.beginPath(); ctx.arc(e.x+24,e.y+10,3,0,Math.PI*2); ctx.fill();
        // Steam
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        var stm = Math.sin(gameTime*3)*2;
        ctx.fillRect(e.x+8,e.y+4+stm,2,6);
        ctx.fillRect(e.x+20,e.y+6-stm,2,5);
      } else {
        // Fallback generic
        ctx.fillStyle = color;
        ctx.fillRect(e.x+2,e.y+2,28,28);
        ctx.fillStyle = PAL.white;
        ctx.globalAlpha = pulse*0.4;
        ctx.fillRect(e.x+8,e.y+8,16,16);
        ctx.globalAlpha = pulse;
        ctx.fillStyle = PAL.white;
        ctx.font = '14px monospace';
        ctx.fillText(e.icon||'!', e.x+10, e.y+22);
      }
      ctx.globalAlpha = 1;

      // Label + description when near
      if (dd < rad) {
        ctx.fillStyle = color;
        ctx.font = '9px monospace';
        ctx.fillText(e.label, e.x - 8, e.y - 8);
        ctx.fillStyle = PAL.whiteD;
        ctx.font = '7px monospace';
        ctx.fillText(e.desc || '', e.x - 8, e.y);

      }
    }

    if (e.type === 'insight') {
      const visible = e.visible !== false && Math.sin(gameTime * 2 + e.x * 0.1) > -0.3;
      if (visible) {
        ctx.globalAlpha = 0.6 + Math.sin(gameTime * 3 + e.x) * 0.3;
        const ix = e.x, iy = e.y;

        if (e.id === 'i_leaf') {
          // Decaying leaf — brown with green remnant
          ctx.fillStyle = '#6b4a2a';
          ctx.fillRect(ix+8, iy+10, 16, 10);
          ctx.fillRect(ix+12, iy+6, 8, 4);
          ctx.fillStyle = '#4a6b3a';
          ctx.fillRect(ix+14, iy+8, 6, 3);
          ctx.fillStyle = '#8b7355';
          ctx.fillRect(ix+10, iy+18, 12, 4);
          // Vein
          ctx.fillStyle = '#3d5c30';
          ctx.fillRect(ix+15, iy+10, 2, 10);
        } else if (e.id === 'i_skull') {
          // Small skull
          ctx.fillStyle = '#e8e0d0';
          ctx.fillRect(ix+8, iy+6, 16, 14);
          ctx.fillRect(ix+10, iy+4, 12, 4);
          ctx.fillRect(ix+10, iy+20, 12, 4);
          // Eye sockets
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(ix+10, iy+10, 4, 4);
          ctx.fillRect(ix+18, iy+10, 4, 4);
          // Nose
          ctx.fillRect(ix+14, iy+15, 3, 3);
          // Teeth
          ctx.fillStyle = '#b8b0a0';
          ctx.fillRect(ix+11, iy+20, 2, 3);
          ctx.fillRect(ix+15, iy+20, 2, 3);
          ctx.fillRect(ix+19, iy+20, 2, 3);
        } else if (e.id === 'i_candle') {
          // Candle with flickering flame
          ctx.fillStyle = '#e8c840';
          ctx.fillRect(ix+13, iy+14, 6, 14);
          ctx.fillStyle = '#c8a020';
          ctx.fillRect(ix+13, iy+26, 8, 3);
          // Flame
          var flick = Math.sin(gameTime * 8) * 2;
          ctx.fillStyle = PAL.flame;
          ctx.fillRect(ix+14 + flick, iy+6, 4, 8);
          ctx.fillStyle = '#ffcc00';
          ctx.fillRect(ix+15 + flick, iy+8, 2, 5);
          // Drip
          ctx.fillStyle = '#d4c060';
          ctx.fillRect(ix+17, iy+18, 2, 4);
        } else if (e.id === 'i_water') {
          // Water ripple — concentric rings
          var cx2 = ix + 16, cy2 = iy + 16;
          for (var ri = 3; ri > 0; ri--) {
            var rPhase = (gameTime * 1.2 + ri * 0.6) % 3;
            var rr = 4 + rPhase * 6;
            ctx.globalAlpha = (0.5 - rPhase * 0.15) * (0.6 + Math.sin(gameTime * 3 + e.x) * 0.3);
            ctx.strokeStyle = PAL.water;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(cx2, cy2, rr, 0, Math.PI * 2);
            ctx.stroke();
          }
          // Center drop
          ctx.globalAlpha = 0.7;
          ctx.fillStyle = PAL.water;
          ctx.beginPath(); ctx.arc(cx2, cy2, 2, 0, Math.PI * 2); ctx.fill();
        } else {
          // Fallback generic glow
          ctx.fillStyle = PAL.gold;
          ctx.fillRect(ix+6, iy+6, 20, 20);
        }

        ctx.globalAlpha = 1;
        if (dist(player, e) < 60) {
          ctx.fillStyle = PAL.white;
          ctx.font = '9px monospace';
          ctx.fillText(e.label, e.x - 4, e.y - 4);
        }
      }
    }

    if (e.type === 'rain_candle') {
      var cx2 = e.x, cy2 = e.y;
      // Candle body
      ctx.fillStyle = PAL.candle;
      ctx.fillRect(cx2+13, cy2+8, 6, 14);
      ctx.fillStyle = PAL.goldD;
      ctx.fillRect(cx2+13, cy2+20, 8, 3);
      // Wick
      ctx.fillStyle = PAL.black;
      ctx.fillRect(cx2+15, cy2+5, 2, 4);
      // Flickering flame
      var flick = Math.sin(gameTime * 8) * 2;
      ctx.fillStyle = PAL.flame;
      ctx.fillRect(cx2+14 + flick, cy2-2, 4, 8);
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(cx2+15 + flick, cy2+0, 2, 5);
      // Warm glow
      ctx.globalAlpha = 0.12 + Math.sin(gameTime * 6) * 0.04;
      ctx.fillStyle = '#e8a830';
      ctx.beginPath();
      ctx.arc(cx2+16, cy2+6, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    if (e.type === 'angry_villager') {
      var ex = e.x, ey = e.y;
      // Head
      ctx.fillStyle = '#d4a570';
      ctx.fillRect(ex+10, ey+2, 12, 10);
      // Angry eyebrows
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(ex+11, ey+3, 4, 2);
      ctx.fillRect(ex+17, ey+3, 4, 2);
      // Angry eyes
      ctx.fillRect(ex+12, ey+6, 3, 2);
      ctx.fillRect(ex+18, ey+6, 3, 2);
      // Open mouth (yelling)
      ctx.fillRect(ex+14, ey+9, 4, 3);
      // Body
      ctx.fillStyle = '#4a5a3a';
      ctx.fillRect(ex+8, ey+12, 16, 14);
      // Arms raised in anger
      ctx.fillStyle = '#d4a570';
      ctx.fillRect(ex+4, ey+10, 4, 8);
      ctx.fillRect(ex+24, ey+10, 4, 8);
      // Legs
      ctx.fillStyle = '#3a4a2a';
      ctx.fillRect(ex+10, ey+26, 4, 6);
      ctx.fillRect(ex+18, ey+26, 4, 6);
      // Anger marks
      if (Math.sin(gameTime * 5 + e.x) > 0) {
        ctx.fillStyle = PAL.red;
        ctx.fillRect(ex+24, ey-2, 3, 3);
        ctx.fillRect(ex+28, ey-2, 3, 3);
      }
      // Interact prompt
      if (dist(player, e) < 50 && !e.talked) {
        ctx.fillStyle = PAL.red;
        ctx.font = '9px monospace';
        ctx.fillText('!', ex+15, ey-4);
      }
    }

    // Hindrance entities — distinct pixel sprites per type
    if (e.type === 'hindrance') {
      var hx = e.x, hy = e.y;
      var hpulse = Math.sin(e.pulseTimer * 3) * 0.15;
      ctx.globalAlpha = 0.6 + hpulse;
      if (e.hindranceType === 'desire') {
        // Golden fruit — shimmering
        ctx.fillStyle = e.color;
        ctx.fillRect(hx+10, hy+8, 12, 12);
        ctx.fillStyle = '#c8a010';
        ctx.fillRect(hx+12, hy+10, 8, 8);
        ctx.fillStyle = '#5a3a1a';
        ctx.fillRect(hx+15, hy+4, 2, 5);
        ctx.fillStyle = '#4a8a3a';
        ctx.fillRect(hx+17, hy+4, 5, 3);
      } else if (e.hindranceType === 'ill_will') {
        // Red flame
        var fflick = Math.sin(gameTime * 7) * 2;
        ctx.fillStyle = e.color;
        ctx.fillRect(hx+10+fflick, hy+4, 6, 16);
        ctx.fillStyle = '#ff6040';
        ctx.fillRect(hx+12+fflick, hy+8, 4, 10);
        ctx.fillStyle = '#ffaa40';
        ctx.fillRect(hx+13+fflick, hy+10, 2, 6);
      } else if (e.hindranceType === 'sloth') {
        // Grey fog cloud
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(hx+16, hy+16, 10+Math.sin(gameTime*1.5)*2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#5a5a5a';
        ctx.beginPath();
        ctx.arc(hx+10, hy+14, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(hx+22, hy+14, 6, 0, Math.PI*2);
        ctx.fill();
      } else if (e.hindranceType === 'restlessness') {
        // Buzzing fly — rapid movement
        var fxOff = Math.sin(gameTime*12)*4;
        var fyOff = Math.cos(gameTime*10)*3;
        ctx.fillStyle = e.color;
        ctx.fillRect(hx+14+fxOff, hy+12+fyOff, 4, 4);
        ctx.fillStyle = '#808060';
        ctx.fillRect(hx+12+fxOff, hy+10+fyOff, 3, 2);
        ctx.fillRect(hx+18+fxOff, hy+10+fyOff, 3, 2);
        // Wings
        ctx.globalAlpha = 0.3 + hpulse;
        ctx.fillStyle = '#c0c0a0';
        ctx.fillRect(hx+10+fxOff, hy+8+fyOff, 4, 6);
        ctx.fillRect(hx+19+fxOff, hy+8+fyOff, 4, 6);
      } else if (e.hindranceType === 'doubt') {
        // Question ghost — translucent with "?"
        ctx.globalAlpha = 0.4 + hpulse;
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(hx+16, hy+12, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#a0a0d0';
        ctx.fillRect(hx+10, hy+16, 12, 8);
        ctx.fillStyle = '#ffffff';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('?', hx+16, hy+17);
        ctx.textAlign = 'left';
      }
      ctx.globalAlpha = 1;
      // Label when near
      if (dist(player, e) < 60) {
        ctx.fillStyle = e.color;
        ctx.font = '8px monospace';
        ctx.fillText(e.desc, hx-4, hy-4);
      }
    }
  }

  // Shadow (Level 3)
  if (shadowActive) {
    ctx.globalAlpha = 0.4 + Math.sin(gameTime * 2) * 0.15;
    const sFrames = monkFrames[player.dir];
    const shadowSprite = prerenderSprite(sFrames[player.frame], [
      '', PAL.shadow, PAL.shadowD, PAL.shadowD, PAL.shadow,
      PAL.shadowD, PAL.shadow, PAL.shadowD, PAL.shadow
    ], 2);
    ctx.drawImage(shadowSprite, shadowX, shadowY);
    ctx.globalAlpha = 1;
  }

  // Player — use sitting sprite during meditation, prostration during bowing
  // In level 0, face the Buddha (up) — use back-view sprite
  if (gameState === 'meditation' || gameState === 'noting') {
    const sitFrame = Math.floor(gameTime / 1.5) % 2;
    const sitData = sitFrame === 0 ? MONK_SIT_1 : MONK_SIT_2;
    const sitSprite = getCachedSprite('monk_sit_' + sitFrame, sitData, MONK_PAL);
    ctx.drawImage(sitSprite, player.x, player.y);
  } else if (gameState === 'breathing') {
    const sitFrame = Math.floor(gameTime / 1.5) % 2;
    const useBackView = (currentLevel === 0);
    const sitData = useBackView
      ? (sitFrame === 0 ? MONK_SIT_UP_1 : MONK_SIT_UP_2)
      : (sitFrame === 0 ? MONK_SIT_1 : MONK_SIT_2);
    const sitSprite = getCachedSprite('monk_sit_' + (useBackView ? 'up_' : '') + sitFrame, sitData, MONK_PAL);
    ctx.drawImage(sitSprite, player.x, player.y);
  } else if (prostrationActive) {
    // Draw prostration animation — monk bowing
    const px = player.x, py = player.y;
    if (prostrationPhase === -1) {
      // Stepping back — draw walking down sprite
      const walkFrame = Math.floor(gameTime * 4) % 2;
      const stepSprite = getCachedSprite('monk_down_' + walkFrame, monkFrames['down'][walkFrame], MONK_PAL);
      ctx.drawImage(stepSprite, px, py);
    } else if (prostrationPhase === 0) {
      // Standing facing north (back view), hands together (anjali)
      ctx.fillStyle = PAL.saffron;
      ctx.fillRect(px + 8, py + 10, 16, 18);
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(px + 10, py + 2, 12, 10);
      // Hands together in front (north of head)
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(px + 13, py, 6, 4);
    } else if (prostrationPhase === 1) {
      // Bending forward (north) — body crouching, head going up
      ctx.fillStyle = PAL.saffron;
      ctx.fillRect(px + 8, py + 16, 16, 12);
      ctx.fillRect(px + 8, py + 10, 16, 8);
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(px + 10, py + 4, 12, 8);
      // Arms reaching north
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(px + 8, py + 2, 6, 4);
      ctx.fillRect(px + 18, py + 2, 6, 4);
    } else if (prostrationPhase === 2) {
      // Fully prostrate facing north — body lying N-S, head at top
      ctx.fillStyle = PAL.saffron;
      ctx.fillRect(px + 10, py + 8, 12, 20);
      ctx.fillRect(px + 8, py + 6, 16, 6);
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(px + 11, py + 2, 10, 6);
      // Arms extended forward (north) alongside head
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(px + 4, py + 2, 6, 4);
      ctx.fillRect(px + 22, py + 2, 6, 4);
      // Gold sparkle at forehead
      if (Math.sin(gameTime * 8) > 0) {
        ctx.fillStyle = PAL.gold;
        ctx.fillRect(px + 14, py, 4, 2);
      }
    } else if (prostrationPhase === 3) {
      // Rising back up (same as bending but arms coming back)
      ctx.fillStyle = PAL.saffron;
      ctx.fillRect(px + 8, py + 16, 16, 12);
      ctx.fillRect(px + 8, py + 10, 16, 8);
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(px + 10, py + 4, 12, 8);
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(px + 6, py + 6, 6, 4);
      ctx.fillRect(px + 20, py + 6, 6, 4);
    }
    // Prostration counter
    if (prostrationPhase >= 0) {
      ctx.fillStyle = PAL.gold;
      ctx.font = '9px monospace';
      ctx.fillText((prostrationCount + 1) + '/3', px + 10, py - 4);
    }
  } else {
    const frames = monkFrames[player.dir];
    const monkSprite = getCachedSprite('monk_'+player.dir+'_'+player.frame, frames[player.frame], MONK_PAL);
    ctx.drawImage(monkSprite, player.x, player.y);
  }

  // Enlightened glow — faint warm aura around monk
  if (enlightened && (currentLevel <= 2 || currentLevel === 0)) {
    ctx.globalAlpha = 0.08 + Math.sin(gameTime * 0.8) * 0.03;
    ctx.fillStyle = '#ffe8a0';
    ctx.beginPath();
    ctx.arc(player.x + 16, player.y + 16, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Alms bowl during Level 2 when collecting
  if (currentLevel === 1) {
    let bowlData;
    if (almsCollected >= almsTotal) bowlData = BOWL_FULL;
    else if (almsCollected > 0) bowlData = BOWL_HALF;
    else bowlData = BOWL_EMPTY;
    const bowlSprite = getCachedSprite('bowl_' + almsCollected, bowlData, BOWL_PAL);
    // Draw bowl in front of monk
    const bx = player.dir === 'left' ? player.x - 6 : player.x + 22;
    const by = player.y + 14;
    ctx.drawImage(bowlSprite, bx, by);
  }

  // Water bucket indicator
  if (hasWater) {
    ctx.fillStyle = PAL.water;
    ctx.fillRect(player.x + 28, player.y + 10, 8, 10);
    ctx.fillStyle = PAL.brown;
    ctx.fillRect(player.x + 26, player.y + 8, 12, 3);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 3, 3);
  }
  ctx.globalAlpha = 1;

  // Thought particles
  for (const t of thoughtParticles) {
    ctx.globalAlpha = t.life;
    const colors = [PAL.purple, PAL.red, PAL.gold, PAL.white];
    ctx.fillStyle = colors[t.type % colors.length];
    const sz = 6 + Math.sin(gameTime * 4 + t.x) * 2;
    ctx.beginPath();
    ctx.arc(t.x, t.y, sz, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PAL.black;
    ctx.fillRect(t.x - 1, t.y - 1, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Rain overlay for rainy season
  if (currentLevel === 2 && rainySeasonActive) {
    renderRain();
  }

  // Restore screen shake transform
  if (temptScreenShake > 0) {
    ctx.restore();
  }

  // Temptation effects (Level 2 distraction interactions)
  if (currentLevel === 1) {
    renderTemptationEffects();
  }

  renderUI();

  if (gameState === 'dialogue' && dialogueText) renderDialogue(dialogueText);
  if (gameState === 'meditation') renderMeditationOverlay();
  if (gameState === 'noting') renderNotingOverlay();
  if (gameState === 'insight_med') renderInsightMedOverlay();
  if (gameState === 'breathing') renderBreathingOverlay();
  if (gameState === 'eating') renderEatingOverlay();

  // Hindrance freeze-frame teaching overlay
  if (hindranceFreezeActive) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    var hfAlpha = Math.min(hindranceFreezeTimer / 0.8, 1);
    ctx.globalAlpha = hfAlpha;
    ctx.fillStyle = '#e8e0d0';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    // Word-wrap the teaching text
    var hfWords = hindranceFreezeText.split(' ');
    var hfLines = []; var hfCurLine = '';
    for (var hw = 0; hw < hfWords.length; hw++) {
      var hfTest = hfCurLine ? hfCurLine + ' ' + hfWords[hw] : hfWords[hw];
      if (ctx.measureText(hfTest).width > WIDTH - 60) { hfLines.push(hfCurLine); hfCurLine = hfWords[hw]; }
      else hfCurLine = hfTest;
    }
    if (hfCurLine) hfLines.push(hfCurLine);
    for (var hl = 0; hl < hfLines.length; hl++) {
      ctx.fillText(hfLines[hl], WIDTH/2, HEIGHT/2 - 10 + hl * 18);
    }
    if (hindranceFreezeTimer > 1) {
      ctx.globalAlpha = Math.sin(gameTime * 3) > 0 ? hfAlpha * 0.6 : 0;
      ctx.font = '9px monospace';
      ctx.fillText('SPACE', WIDTH/2, HEIGHT/2 + hfLines.length * 18 + 10);
    }
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  if (transitionAlpha > 0) renderTransition();
}

// ======================================================================
// UI
// ======================================================================

function renderTemptationEffects() {
  // Screen-edge flash
  if (temptFlashTimer > 0) {
    const flashAlpha = Math.min(temptFlashTimer * 0.4, 0.35);
    ctx.fillStyle = temptFlashColor + flashAlpha + ')';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    // Temptation text — floating, pulsing
    if (temptFlashText && temptFlashTimer > 1.0) {
      const textAlpha = Math.min((temptFlashTimer - 1.0) * 1.5, 0.9);
      ctx.globalAlpha = textAlpha;
      ctx.fillStyle = '#ffffff';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      const textY = HEIGHT / 2 - 60 + Math.sin(gameTime * 4) * 4;
      ctx.fillText(temptFlashText, WIDTH / 2, textY);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    }
  }

  // Screen shake (applied via translate in main render if needed)
  if (temptScreenShake > 0) {
    // We draw a slight visual distortion — wobbly edges
    ctx.globalAlpha = temptScreenShake * 0.3;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, WIDTH, 2);
    ctx.fillRect(0, HEIGHT - 2, WIDTH, 2);
    ctx.globalAlpha = 1;
  }

  // Sparkles / particles
  for (let i = 0; i < temptSparkles.length; i++) {
    const s = temptSparkles[i];
    const alpha = s.life / s.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = s.color;
    // Draw as little glowing squares/diamonds
    const sz = s.size * alpha;
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(gameTime * 3 + i);
    ctx.fillRect(-sz / 2, -sz / 2, sz, sz);
    ctx.restore();
    // Glow effect
    if (sz > 2) {
      ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, sz + 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function renderUI() {
  const barX = 8, barY = 8, barW = 100, barH = 10;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  ctx.fillStyle = PAL.stoneD;
  ctx.fillRect(barX, barY, barW, barH);

  const fn = focus / 100;
  ctx.fillStyle = 'rgb(' + Math.floor(255*(1-fn)) + ',' + Math.floor(200*fn) + ',60)';
  ctx.fillRect(barX, barY, barW * fn, barH);

  ctx.fillStyle = PAL.white;
  ctx.font = '9px monospace';
  ctx.fillText('Focus', barX, barY + barH + 12);

  if (currentLevel === 0) {
    ctx.fillText('Wood: ' + woodChopped + '/' + woodTotal, barX, barY + barH + 24);
    if (hasWater) ctx.fillText('Carrying: Water', barX, barY + barH + 36);
    if (waterDelivered) ctx.fillText('Water: Delivered \u2713', barX, barY + barH + 36);
  }

  if (currentLevel === 1) {
    ctx.fillText('Alms: ' + almsCollected + '/' + almsTotal, barX, barY + barH + 24);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(barX - 2, barY + barH + 30, barW + 4, barH + 4);
    ctx.fillStyle = PAL.stoneD;
    ctx.fillRect(barX, barY + barH + 32, barW, barH);
    const cn = composure / 100;
    ctx.fillStyle = 'rgb(60,' + Math.floor(200*cn) + ',' + Math.floor(255*cn) + ')';
    ctx.fillRect(barX, barY + barH + 32, barW * cn, barH);
    ctx.fillStyle = PAL.white;
    ctx.fillText('Composure', barX, barY + barH * 2 + 44);

    if (nearDistraction) {
      ctx.fillStyle = PAL.red;
      ctx.font = '9px monospace';
      ctx.fillText('\u26A0 Distraction nearby!', WIDTH - 160, barY + 10);

    }
  }

  if (currentLevel === 2) {
    if (rainySeasonActive) {
      ctx.fillStyle = PAL.water;
      ctx.fillText('Vassa \u2014 Rains Retreat', barX, barY + barH + 24);
      ctx.fillStyle = PAL.whiteD;
      ctx.fillText('Reach the monastery', barX, barY + barH + 36);
    } else {
      ctx.fillText('Insights: ' + insightsGathered + '/' + insightsTotal, barX, barY + barH + 24);
    }
  }

  // Mobile prompt
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  if (isMobile) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '8px monospace';
    ctx.fillText('Tap to move', WIDTH - 100, HEIGHT - 6);
  }

  // Craving meter (shown from L2 onward)
  if (currentLevel >= 1) {
    renderCravingMeter();
  }

  // Tap-to-move target indicator with precise crosshair
  if (tapTarget && gameState === 'playing') {
    // Pulsing target circle
    const pulseAlpha = 0.3 + Math.sin(gameTime * 4) * 0.3;
    ctx.fillStyle = 'rgba(200, 200, 100, ' + pulseAlpha + ')';
    ctx.beginPath();
    ctx.arc(tapTarget.x, tapTarget.y, 5, 0, Math.PI * 2);
    ctx.fill();

    // Precise crosshair
    ctx.strokeStyle = 'rgba(200, 200, 100, ' + (pulseAlpha + 0.4) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tapTarget.x - 8, tapTarget.y);
    ctx.lineTo(tapTarget.x + 8, tapTarget.y);
    ctx.moveTo(tapTarget.x, tapTarget.y - 8);
    ctx.lineTo(tapTarget.x, tapTarget.y + 8);
    ctx.stroke();

    // Outer ring
    ctx.strokeStyle = 'rgba(200, 200, 100, ' + (pulseAlpha + 0.2) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(tapTarget.x, tapTarget.y, 12, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function renderDialogue(text) {
  const boxH = 70;
  // On mobile, position dialogue closer to middle; on desktop, keep at bottom
  const isMobile = window.innerWidth < 600;
  const boxY = isMobile ? HEIGHT - boxH - 60 : HEIGHT - boxH - 8;
  const portraitSize = 48;
  const portraitPad = 6;
  const speaker = dialogueSpeaker || 'narration';
  const isNarration = speaker === 'narration';
  const isMahathera = speaker === 'mahathera';
  const isBhikku = speaker === 'bhikku';
  const isVillager = speaker === 'villager';
  const hasPortrait = !isNarration;

  // Border color per speaker
  const borderColor = isMahathera ? PAL.gold : isBhikku ? PAL.saffron : isVillager ? '#8ab4e8' : '#7a7a7a';

  // Box background
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(8, boxY, WIDTH - 16, boxH);
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 2;
  ctx.strokeRect(8, boxY, WIDTH - 16, boxH);

  const px = 12;
  const py = boxY + 4;
  let textX;

  if (hasPortrait) {
    // Portrait area
    ctx.fillStyle = 'rgba(30,25,20,0.9)';
    ctx.fillRect(px, py, portraitSize, portraitSize);
    ctx.strokeStyle = isMahathera ? PAL.gold : isBhikku ? PAL.saffron : '#6a94c8';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, portraitSize, portraitSize);

    const pcx = px + portraitSize / 2;
    const pcy = py + portraitSize / 2;
    const stillTyping = dialogueCharIndex < text.length;
    const mouthOpen = stillTyping && Math.sin(dialogueTalkAnim * 12) > 0;

    if (isMahathera) {
      // Mahathera — old Theravada elder, bald, wrinkles, saffron robes
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(pcx - 8, pcy - 16, 16, 14); // head
      ctx.fillStyle = '#aaa';
      ctx.fillRect(pcx - 6, pcy - 18, 12, 4); // bald top (lighter = aged)
      // Wrinkle lines
      ctx.fillStyle = PAL.skinD;
      ctx.fillRect(pcx - 6, pcy - 12, 2, 1);
      ctx.fillRect(pcx + 4, pcy - 12, 2, 1);
      ctx.fillRect(pcx - 4, pcy - 6, 8, 1);
      // Eyes — slightly narrower (wise)
      ctx.fillStyle = PAL.black;
      ctx.fillRect(pcx - 5, pcy - 10, 3, 2);
      ctx.fillRect(pcx + 2, pcy - 10, 3, 2);
      // Bushy grey eyebrows
      ctx.fillStyle = '#999';
      ctx.fillRect(pcx - 6, pcy - 12, 4, 1);
      ctx.fillRect(pcx + 2, pcy - 12, 4, 1);
      if (mouthOpen) {
        ctx.fillStyle = '#3a1a1a';
        ctx.fillRect(pcx - 3, pcy - 4, 6, 3);
      } else {
        ctx.fillStyle = '#8a5a3a';
        ctx.fillRect(pcx - 3, pcy - 4, 6, 1);
      }
      // Saffron robe
      ctx.fillStyle = PAL.saffron;
      ctx.fillRect(pcx - 10, pcy, 20, 16);
      ctx.fillStyle = PAL.saffronD;
      ctx.fillRect(pcx - 8, pcy + 2, 16, 12);
    } else if (isBhikku) {
      // Young bhikku — the player character, saffron robes, bald
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(pcx - 7, pcy - 14, 14, 12);
      ctx.fillStyle = PAL.skinD;
      ctx.fillRect(pcx - 5, pcy - 16, 10, 3); // bald scalp
      ctx.fillStyle = PAL.black;
      ctx.fillRect(pcx - 4, pcy - 8, 2, 2);
      ctx.fillRect(pcx + 2, pcy - 8, 2, 2);
      if (mouthOpen) {
        ctx.fillStyle = '#3a1a1a';
        ctx.fillRect(pcx - 2, pcy - 3, 4, 3);
      } else {
        ctx.fillStyle = '#8a5a3a';
        ctx.fillRect(pcx - 2, pcy - 3, 4, 1);
      }
      ctx.fillStyle = PAL.saffron;
      ctx.fillRect(pcx - 9, pcy + 1, 18, 14);
      ctx.fillStyle = PAL.saffronD;
      ctx.fillRect(pcx - 7, pcy + 3, 14, 10);
    } else {
      // Villager portrait — hair, simple clothes
      ctx.fillStyle = PAL.skin;
      ctx.fillRect(pcx - 7, pcy - 14, 14, 12);
      ctx.fillStyle = PAL.black;
      ctx.fillRect(pcx - 6, pcy - 16, 12, 4);
      ctx.fillStyle = PAL.black;
      ctx.fillRect(pcx - 4, pcy - 8, 2, 2);
      ctx.fillRect(pcx + 2, pcy - 8, 2, 2);
      if (mouthOpen) {
        ctx.fillStyle = '#3a1a1a';
        ctx.fillRect(pcx - 2, pcy - 3, 4, 3);
      } else {
        ctx.fillStyle = '#8a5a3a';
        ctx.fillRect(pcx - 2, pcy - 3, 4, 1);
      }
      ctx.fillStyle = '#6a8a5a';
      ctx.fillRect(pcx - 9, pcy + 1, 18, 14);
      ctx.fillStyle = '#4a6a3a';
      ctx.fillRect(pcx - 7, pcy + 3, 14, 10);
    }

    // Speaker name label
    const nameColor = isMahathera ? PAL.gold : isBhikku ? PAL.saffron : '#8ab4e8';
    ctx.fillStyle = nameColor;
    ctx.font = '8px monospace';
    const nameLabel = isMahathera ? 'Mahathera' : isBhikku ? 'Bhikku' : 'Villager';
    ctx.fillText(nameLabel, px, py + portraitSize + 10);
    textX = px + portraitSize + portraitPad + 4;
  } else {
    // Narration — no portrait, text starts closer to left edge
    textX = px + 8;
  }

  // Typewriter text — only show up to dialogueCharIndex
  const displayText = text.substring(0, dialogueCharIndex);
  ctx.fillStyle = PAL.white;
  ctx.font = '11px monospace';

  const words = displayText.split(' ');
  let line = '';
  let ly = boxY + 18;
  const maxW = WIDTH - textX - 20;
  for (const w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line, textX, ly);
      line = w + ' ';
      ly += 14;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, textX, ly);

  // Prompt arrow — only show when text is fully revealed
  if (dialogueCharIndex >= text.length) {
    ctx.fillStyle = PAL.gold;
    if (Math.sin(gameTime * 5) > 0) ctx.fillText('\u25BC', WIDTH - 30, boxY + boxH - 8);
  }
}

function renderNotingOverlay() {
  // Dark forest overlay
  ctx.fillStyle = 'rgba(10,20,10,0.5)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Wind effect (full screen streaks when wind event)
  if (notingWindAlpha > 0) {
    ctx.globalAlpha = notingWindAlpha * 0.4;
    ctx.strokeStyle = '#a0c0a0';
    ctx.lineWidth = 1;
    for (var wi = 0; wi < 12; wi++) {
      var wy = 20 + wi * (HEIGHT / 12) + Math.sin(gameTime * 3 + wi) * 8;
      var wx1 = notingWindDir > 0 ? 0 : WIDTH;
      var wx2 = notingWindDir > 0 ? WIDTH * (1 - notingWindAlpha * 0.5) : WIDTH * notingWindAlpha * 0.5;
      ctx.beginPath();
      ctx.moveTo(wx1, wy);
      ctx.lineTo(wx2, wy + Math.sin(wi * 0.7) * 6);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Draw active noting events
  for (var i = 0; i < notingEvents.length; i++) {
    var ev = notingEvents[i];
    var fadeIn = Math.min(ev.timer / 0.2, 1);
    var fadeOut = ev.noted ? Math.max(1 - (ev.timer - ev.maxTime + 0.5) * 4, 0) : (ev.missed ? Math.max(1 - (ev.timer - ev.maxTime) * 3, 0) : 1);
    var alpha = fadeIn * fadeOut;
    if (alpha <= 0) continue;

    // Time remaining ring
    var remaining = 1 - ev.timer / ev.maxTime;
    if (!ev.noted && !ev.missed) {
      ctx.globalAlpha = alpha * 0.3;
      ctx.strokeStyle = remaining > 0.3 ? PAL.white : PAL.red;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ev.x, ev.y, 18, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * remaining);
      ctx.stroke();
    }

    ctx.globalAlpha = alpha;

    if (ev.type === 'see') {
      // Thought image — wispy purple thought bubble
      if (ev.noted) {
        ctx.fillStyle = PAL.gold;
      } else if (ev.missed) {
        ctx.fillStyle = PAL.red;
      } else {
        ctx.fillStyle = 'rgba(140,100,180,0.7)';
      }
      var imgR = 14 + Math.sin(gameTime * 4 + ev.x) * 2;
      ctx.beginPath();
      ctx.arc(ev.x, ev.y, imgR, 0, Math.PI * 2);
      ctx.fill();
      // Inner detail based on image type
      ctx.fillStyle = 'rgba(200,180,230,0.6)';
      if (ev.imageType === 0) {
        // Face
        ctx.fillRect(ev.x - 4, ev.y - 4, 3, 3);
        ctx.fillRect(ev.x + 2, ev.y - 4, 3, 3);
        ctx.fillRect(ev.x - 3, ev.y + 2, 6, 2);
      } else if (ev.imageType === 1) {
        // House
        ctx.fillRect(ev.x - 5, ev.y - 2, 10, 8);
        ctx.fillRect(ev.x - 3, ev.y - 6, 6, 4);
      } else if (ev.imageType === 2) {
        // Swirl
        ctx.beginPath();
        ctx.arc(ev.x, ev.y, 6, 0, Math.PI * 1.5);
        ctx.stroke();
      } else {
        // Star
        ctx.fillRect(ev.x - 1, ev.y - 6, 2, 12);
        ctx.fillRect(ev.x - 6, ev.y - 1, 12, 2);
      }
      // Label
      ctx.fillStyle = PAL.white;
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('\u25B2 See', ev.x, ev.y + 24);
    } else if (ev.type === 'hear') {
      // Bird
      if (ev.noted) {
        ctx.fillStyle = PAL.gold;
      } else if (ev.missed) {
        ctx.fillStyle = PAL.red;
      } else {
        ctx.fillStyle = '#8b6b3a';
      }
      // Bird body
      ctx.fillRect(ev.x - 4, ev.y - 2, 8, 6);
      // Head
      ctx.fillRect(ev.x + 3, ev.y - 5, 5, 5);
      // Beak
      ctx.fillStyle = '#e8c840';
      ctx.fillRect(ev.x + 7, ev.y - 4, 3, 2);
      // Wing
      ctx.fillStyle = ev.noted ? '#c8a020' : '#6b4a2a';
      var wingY = ev.y - 4 + Math.sin(gameTime * 8 + ev.x) * 3;
      ctx.fillRect(ev.x - 6, wingY, 8, 3);
      // Eye
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(ev.x + 5, ev.y - 4, 1, 1);
      // Sound waves
      if (!ev.noted && !ev.missed) {
        ctx.strokeStyle = 'rgba(200,180,140,0.5)';
        ctx.lineWidth = 1;
        for (var sw = 0; sw < 3; sw++) {
          var swR = 10 + sw * 6 + Math.sin(gameTime * 5) * 2;
          ctx.globalAlpha = alpha * (0.5 - sw * 0.15);
          ctx.beginPath();
          ctx.arc(ev.x + 8, ev.y - 3, swR, -0.5, 0.5);
          ctx.stroke();
        }
        ctx.globalAlpha = alpha;
      }
      // Label
      ctx.fillStyle = PAL.white;
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('\u25B6 Hear', ev.x, ev.y + 16);
    } else if (ev.type === 'feel') {
      // Wind gusts indicator at bottom/sides
      if (ev.noted) {
        ctx.fillStyle = 'rgba(200,200,100,0.5)';
      } else if (ev.missed) {
        ctx.fillStyle = 'rgba(200,60,60,0.4)';
      } else {
        ctx.fillStyle = 'rgba(160,200,160,0.4)';
      }
      // Leaf/wind particles around center area
      for (var li = 0; li < 6; li++) {
        var lx = WIDTH / 2 - 80 + li * 30 + Math.sin(gameTime * 3 + li * 1.5) * 20;
        var ly = HEIGHT / 2 + Math.cos(gameTime * 2.5 + li * 2) * 30;
        ctx.fillRect(lx, ly, 4 + Math.sin(li) * 2, 2);
      }
      // Large center indicator
      ctx.strokeStyle = ev.noted ? PAL.gold : (ev.missed ? PAL.red : 'rgba(160,220,160,0.5)');
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(WIDTH / 2, HEIGHT / 2 + 30, 20 + Math.sin(gameTime * 2) * 4, 0, Math.PI * 2);
      ctx.stroke();
      // Label
      ctx.fillStyle = PAL.white;
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('\u25C0 Feel', WIDTH / 2, HEIGHT / 2 + 58);
    }
  }
  ctx.globalAlpha = 1;

  // Shadow during noting
  if (shadowActive) {
    ctx.globalAlpha = 0.3 + Math.sin(gameTime * 2) * 0.1;
    ctx.fillStyle = PAL.shadow;
    ctx.beginPath();
    ctx.arc(shadowX + 16, shadowY + 16, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PAL.shadowD;
    ctx.fillRect(shadowX + 10, shadowY + 6, 4, 4);
    ctx.fillRect(shadowX + 18, shadowY + 6, 4, 4);
    ctx.globalAlpha = 1;
  }

  // Feedback flash
  if (notingFeedbackTimer > 0) {
    ctx.globalAlpha = notingFeedbackTimer / 0.8;
    ctx.fillStyle = notingFeedback.indexOf('\u2714') >= 0 ? PAL.gold : PAL.red;
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(notingFeedback, WIDTH / 2, HEIGHT / 2 - 40);
    ctx.globalAlpha = 1;
  }

  // Progress ring (top center)
  var cx_ = WIDTH / 2;
  var cy_ = 28;
  var progress = notingTimer / notingDuration;
  ctx.strokeStyle = PAL.stoneD;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cx_, cy_, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.strokeStyle = PAL.saffron;
  ctx.beginPath();
  ctx.arc(cx_, cy_, 14, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
  ctx.stroke();

  ctx.fillStyle = PAL.white;
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(Math.max(0, Math.ceil(notingDuration - notingTimer)) + 's', cx_, cy_ + 4);

  // Score
  ctx.fillText('Noted: ' + notingScore + '/' + notingTotal, cx_, cy_ + 36);

  // Controls reminder at bottom
  ctx.fillStyle = 'rgba(200,200,200,0.6)';
  ctx.font = '9px monospace';
  ctx.fillText('\u25B2 See   \u25B6 Hear   \u25C0 Feel', cx_, HEIGHT - 10);

  // Focus bar
  var barX = cx_ - 50;
  var barY = HEIGHT - 30;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(barX - 2, barY - 2, 104, 10);
  var foc = focus / 100;
  ctx.fillStyle = 'rgb(' + Math.floor(255 * (1 - foc)) + ',' + Math.floor(200 * foc) + ',60)';
  ctx.fillRect(barX, barY, 100 * foc, 6);
  ctx.textAlign = 'left';
}

  const cx_ = WIDTH / 2;
  const cy_ = 40;

  ctx.strokeStyle = PAL.stoneD;

function renderEatingOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Draw a large centered bowl with food level based on progress
  const bowlCx = WIDTH / 2;
  const bowlCy = HEIGHT / 2 - 10;
  const bowlW = 80, bowlH = 50;
  const fillPct = 1 - (eatingRound / eatingTotalRounds);

  // Bowl body
  ctx.fillStyle = PAL.brownD;
  ctx.beginPath();
  ctx.ellipse(bowlCx, bowlCy + 12, bowlW / 2, bowlH / 2.5, 0, 0, Math.PI);
  ctx.fill();
  ctx.fillStyle = PAL.brown;
  ctx.beginPath();
  ctx.ellipse(bowlCx, bowlCy, bowlW / 2, bowlH / 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Food inside (rice) — decreases each round
  if (fillPct > 0.05) {
    const foodH = bowlH * 0.35 * fillPct;
    ctx.fillStyle = PAL.whiteD;
    ctx.beginPath();
    ctx.ellipse(bowlCx, bowlCy - foodH * 0.2, (bowlW / 2 - 6) * fillPct + 6, bowlH / 4 * fillPct + 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PAL.white;
    ctx.beginPath();
    ctx.ellipse(bowlCx, bowlCy - foodH * 0.4, (bowlW / 2 - 10) * fillPct + 4, bowlH / 5 * fillPct + 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Rim highlight
  ctx.strokeStyle = PAL.gold;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(bowlCx, bowlCy, bowlW / 2, bowlH / 3, 0, Math.PI, Math.PI * 2);
  ctx.stroke();

  // Eating animation — spoon/hand motion when showing result
  if (eatingShowResult > 0) {
    const spX = bowlCx + 20 + Math.sin(eatingShowResult * 8) * 10;
    const spY = bowlCy - 20 - eatingShowResult * 10;
    ctx.fillStyle = PAL.skin;
    ctx.fillRect(spX, spY, 8, 12);
    ctx.fillStyle = PAL.skinD;
    ctx.fillRect(spX + 2, spY + 2, 4, 8);
  }

  ctx.fillStyle = PAL.white;
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Mindful Eating', bowlCx, bowlCy - bowlH - 10);
  ctx.font = '10px monospace';
  ctx.fillText('Round ' + (eatingRound + 1) + '/' + eatingTotalRounds, bowlCx, bowlCy + bowlH + 10);

  if (eatingPrompt) {
    ctx.fillStyle = eatingWaitingForKey ? PAL.gold : PAL.white;
    ctx.font = '11px monospace';
    ctx.fillText(eatingPrompt, bowlCx, bowlCy + bowlH + 28);
  } else {
    ctx.fillStyle = PAL.whiteD;
    ctx.fillText('Wait for the prompt...', bowlCx, bowlCy + bowlH + 28);
  }

  ctx.fillStyle = PAL.saffron;
  ctx.fillText('Mindful bites: ' + eatingScore, bowlCx, bowlCy + bowlH + 46);
  ctx.textAlign = 'left';
}

function renderAbstractLevel() {
  if (currentLevel === 3) renderAccessConc();
  else if (currentLevel === 4) renderKasina();
  else if (currentLevel === 5) renderJhana1Level();
  else if (currentLevel === 6) renderJhana2Level();
  else if (currentLevel === 7) renderJhana3Level();
  else if (currentLevel === 8) renderJhana4Level();
  else if (currentLevel === 9) renderInfiniteSpaceLevel();
  else if (currentLevel === 10) renderInfiniteConsciousnessLevel();
  else if (currentLevel === 11) renderNothingnessLevel();
  else if (currentLevel === 12) renderNeitherNorLevel();
}

function renderAccessConc() {
  // Dark background with subtle grid
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.strokeStyle = 'rgba(80,80,120,0.1)';
  for (var gx = 0; gx < WIDTH; gx += 20) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, HEIGHT); ctx.stroke(); }
  for (var gy = 0; gy < HEIGHT; gy += 20) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(WIDTH, gy); ctx.stroke(); }

  // Meditation orb
  var sz = 10 + Math.sin(gameTime * 2) * 2;
  var grad = ctx.createRadialGradient(accOrbX, accOrbY, 0, accOrbX, accOrbY, sz * 2);
  grad.addColorStop(0, 'rgba(200,180,255,0.9)');
  grad.addColorStop(0.5, 'rgba(120,100,200,0.5)');
  grad.addColorStop(1, 'rgba(60,40,120,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(accOrbX, accOrbY, sz * 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e0d0ff';
  ctx.beginPath(); ctx.arc(accOrbX, accOrbY, sz * 0.5, 0, Math.PI * 2); ctx.fill();

  // Reticle
  ctx.strokeStyle = PAL.saffron;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(accReticleX, accReticleY, 12, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(accReticleX - 16, accReticleY); ctx.lineTo(accReticleX - 8, accReticleY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(accReticleX + 8, accReticleY); ctx.lineTo(accReticleX + 16, accReticleY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(accReticleX, accReticleY - 16); ctx.lineTo(accReticleX, accReticleY - 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(accReticleX, accReticleY + 8); ctx.lineTo(accReticleX, accReticleY + 16); ctx.stroke();

  // Disturbances
  for (var di = 0; di < accDisturbs.length; di++) {
    var d = accDisturbs[di];
    ctx.globalAlpha = Math.min(d.life, 1);
    var dcol = d.type === 'thought' ? PAL.purple : d.type === 'emotion' ? PAL.red : d.type === 'memory' ? PAL.gold : '#80c0ff';
    ctx.fillStyle = dcol;
    ctx.font = '9px monospace';
    ctx.fillText(d.label, d.x - 20, d.y);
    ctx.fillRect(d.x - 3, d.y + 2, 6, 6);
  }
  ctx.globalAlpha = 1;

  // Stability bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(WIDTH / 2 - 52, 10, 104, 14);
  ctx.fillStyle = PAL.stoneD;
  ctx.fillRect(WIDTH / 2 - 50, 12, 100, 10);
  var sn = accStability / 100;
  ctx.fillStyle = 'rgb(' + Math.floor(100 * (1 - sn)) + ',' + Math.floor(150 + 105 * sn) + ',200)';
  ctx.fillRect(WIDTH / 2 - 50, 12, 100 * sn, 10);
  ctx.fillStyle = PAL.white;
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Stability', WIDTH / 2, 36);
  ctx.fillText('Track the meditation object with arrows', WIDTH / 2, HEIGHT - 10);
  ctx.textAlign = 'left';
}

function renderKasina() {
  ctx.fillStyle = '#0a0604';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  if (kasPhase === 0) {
    if (kasEyesOpen) {
      // Actual candle with flame
      // Table surface
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(WIDTH/2 - 40, HEIGHT/2 + 40, 80, 10);
      // Candle body (wax)
      var candleX = WIDTH/2 - 6;
      var candleY = HEIGHT/2 - 20;
      ctx.fillStyle = '#e8d8a0';
      ctx.fillRect(candleX, candleY, 12, 60);
      ctx.fillStyle = '#d0c080';
      ctx.fillRect(candleX, candleY, 2, 60);
      // Wax drips
      ctx.fillStyle = '#f0e8c0';
      ctx.fillRect(candleX+3, candleY+10, 3, 15);
      ctx.fillRect(candleX+8, candleY+20, 2, 12);
      // Wick
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(WIDTH/2 - 1, candleY - 6, 2, 8);
      // Flame
      var flick = Math.sin(gameTime * 10) * 1.5;
      var flick2 = Math.cos(gameTime * 7) * 1;
      // Outer flame (orange-red)
      ctx.fillStyle = '#e86820';
      ctx.beginPath();
      ctx.moveTo(WIDTH/2 + flick, candleY - 28);
      ctx.quadraticCurveTo(WIDTH/2 - 8 + flick2, candleY - 12, WIDTH/2, candleY - 4);
      ctx.quadraticCurveTo(WIDTH/2 + 8 - flick2, candleY - 12, WIDTH/2 + flick, candleY - 28);
      ctx.fill();
      // Mid flame (yellow)
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(WIDTH/2 + flick*0.7, candleY - 22);
      ctx.quadraticCurveTo(WIDTH/2 - 5 + flick2*0.5, candleY - 12, WIDTH/2, candleY - 6);
      ctx.quadraticCurveTo(WIDTH/2 + 5 - flick2*0.5, candleY - 12, WIDTH/2 + flick*0.7, candleY - 22);
      ctx.fill();
      // Core (white-hot)
      ctx.fillStyle = '#fff8e0';
      ctx.beginPath();
      ctx.moveTo(WIDTH/2 + flick*0.3, candleY - 14);
      ctx.quadraticCurveTo(WIDTH/2 - 3, candleY - 10, WIDTH/2, candleY - 6);
      ctx.quadraticCurveTo(WIDTH/2 + 3, candleY - 10, WIDTH/2 + flick*0.3, candleY - 14);
      ctx.fill();
      // Warm glow
      var glowR = 80 + Math.sin(gameTime * 6) * 10;
      ctx.globalAlpha = 0.12;
      var fGrad = ctx.createRadialGradient(WIDTH/2, candleY-15, 0, WIDTH/2, candleY-15, glowR);
      fGrad.addColorStop(0, '#ff8840');
      fGrad.addColorStop(1, 'rgba(255,100,20,0)');
      ctx.fillStyle = fGrad;
      ctx.beginPath(); ctx.arc(WIDTH/2, candleY-15, glowR, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Eyes closed — dim ghost of the candle flame
      ctx.globalAlpha = 0.15 + Math.sin(gameTime * 2) * 0.05;
      ctx.fillStyle = '#804020';
      ctx.beginPath();
      ctx.moveTo(WIDTH/2, HEIGHT/2 - 28);
      ctx.quadraticCurveTo(WIDTH/2 - 8, HEIGHT/2 - 10, WIDTH/2, HEIGHT/2);
      ctx.quadraticCurveTo(WIDTH/2 + 8, HEIGHT/2 - 10, WIDTH/2, HEIGHT/2 - 28);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = PAL.white;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(kasEyesOpen ? 'Eyes Open \u2014 Gaze into the candle flame' : 'Eyes Closed \u2014 See the flame\u2019s afterimage', WIDTH / 2, 30);
    ctx.fillText('SPACE to toggle eyes', WIDTH / 2, HEIGHT - 10);
    ctx.textAlign = 'left';
  } else if (kasPhase === 1) {
    if (!kasEyesOpen) {
      // Candle flame afterimage — ebbs and flows with complementary colors
      var af = 0.35 + Math.sin(gameTime * 1.5) * 0.2;
      var afSize = 25 + Math.sin(gameTime * 2) * 8;
      // Color cycles: blue-green → indigo → purple → teal
      var cPhase = (gameTime * 0.3) % 1;
      var cr, cg, cb;
      if (cPhase < 0.25) {
        cr = 20; cg = 80 + cPhase*400; cb = 200;
      } else if (cPhase < 0.5) {
        cr = 60 + (cPhase-0.25)*300; cg = 180 - (cPhase-0.25)*500; cb = 220;
      } else if (cPhase < 0.75) {
        cr = 135 - (cPhase-0.5)*200; cg = 55; cb = 220 - (cPhase-0.5)*280;
      } else {
        cr = 85 - (cPhase-0.75)*260; cg = 55 + (cPhase-0.75)*100; cb = 150 + (cPhase-0.75)*200;
      }
      cr = Math.max(0,Math.min(255,Math.floor(cr)));
      cg = Math.max(0,Math.min(255,Math.floor(cg)));
      cb = Math.max(0,Math.min(255,Math.floor(cb)));
      ctx.globalAlpha = af;
      // Radial glow
      var afGrad = ctx.createRadialGradient(kasAfterX, kasAfterY, 0, kasAfterX, kasAfterY, afSize*1.5);
      afGrad.addColorStop(0, 'rgb('+cr+','+cg+','+cb+')');
      afGrad.addColorStop(0.4, 'rgba('+Math.floor(cr*0.6)+','+Math.floor(cg*0.6)+','+Math.floor(cb*0.6)+',0.5)');
      afGrad.addColorStop(1, 'rgba('+Math.floor(cr*0.2)+','+Math.floor(cg*0.2)+','+Math.floor(cb*0.2)+',0)');
      ctx.fillStyle = afGrad;
      // Flame-shaped afterimage
      ctx.beginPath();
      ctx.moveTo(kasAfterX, kasAfterY - afSize);
      ctx.quadraticCurveTo(kasAfterX - afSize*0.5, kasAfterY - afSize*0.2, kasAfterX, kasAfterY + afSize*0.3);
      ctx.quadraticCurveTo(kasAfterX + afSize*0.5, kasAfterY - afSize*0.2, kasAfterX, kasAfterY - afSize);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Eyes open — see the candle again (simpler)
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(WIDTH/2 - 40, HEIGHT/2 + 40, 80, 10);
      ctx.fillStyle = '#e8d8a0';
      ctx.fillRect(WIDTH/2 - 6, HEIGHT/2 - 20, 12, 60);
      ctx.fillStyle = '#e86820';
      var fk = Math.sin(gameTime*8)*1.5;
      ctx.beginPath();
      ctx.moveTo(WIDTH/2+fk, HEIGHT/2 - 48);
      ctx.quadraticCurveTo(WIDTH/2 - 8, HEIGHT/2 - 32, WIDTH/2, HEIGHT/2 - 24);
      ctx.quadraticCurveTo(WIDTH/2 + 8, HEIGHT/2 - 32, WIDTH/2+fk, HEIGHT/2 - 48);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(WIDTH/2+fk*0.5, HEIGHT/2 - 42);
      ctx.quadraticCurveTo(WIDTH/2 - 4, HEIGHT/2 - 32, WIDTH/2, HEIGHT/2 - 26);
      ctx.quadraticCurveTo(WIDTH/2 + 4, HEIGHT/2 - 32, WIDTH/2+fk*0.5, HEIGHT/2 - 42);
      ctx.fill();
    }
    ctx.fillStyle = PAL.white;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(!kasEyesOpen ? 'Nimitta forming from the flame...' : 'Close your eyes (SPACE)', WIDTH / 2, 30);
    ctx.fillText('Focus: ' + Math.floor(kasFocusTimer) + '/10', WIDTH / 2, 50);
    ctx.textAlign = 'left';
  } else if (kasPhase === 2) {
    // Boss: Scatter Mind — real nimitta (fire-born) at center
    var nimGrad = ctx.createRadialGradient(kasNimittaX, kasNimittaY, 0, kasNimittaX, kasNimittaY, 35);
    nimGrad.addColorStop(0, '#ffffff');
    nimGrad.addColorStop(0.2, '#ffdd88');
    nimGrad.addColorStop(0.5, '#cc6600');
    nimGrad.addColorStop(1, 'rgba(100,30,0,0)');
    ctx.fillStyle = nimGrad;
    ctx.beginPath(); ctx.arc(kasNimittaX, kasNimittaY, 35, 0, Math.PI * 2); ctx.fill();

    // Fake nimittas — these rotate around center
    for (var fi = 0; fi < kasFakes.length; fi++) {
      var f = kasFakes[fi];
      var fAngle = kasRotation + fi * 1.5;
      var fDist = Math.sqrt((f.x - WIDTH / 2) * (f.x - WIDTH / 2) + (f.y - HEIGHT / 2) * (f.y - HEIGHT / 2));
      var fRx = WIDTH / 2 + Math.cos(fAngle) * fDist;
      var fRy = HEIGHT / 2 + Math.sin(fAngle) * fDist;
      ctx.globalAlpha = 0.5 + Math.sin(gameTime * 5 + fi) * 0.3;
      ctx.fillStyle = '#a06020';
      ctx.beginPath(); ctx.arc(fRx, fRy, 20 + Math.sin(gameTime * 3 + fi * 2) * 8, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Reticle
    ctx.strokeStyle = PAL.gold;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(accReticleX, accReticleY, 10, 0, Math.PI * 2); ctx.stroke();

    // Boss HP
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(WIDTH / 2 - 52, 10, 104, 14);
    ctx.fillStyle = '#cc4400';
    ctx.fillRect(WIDTH / 2 - 50, 12, Math.max(0, kasBossHP), 10);
    ctx.fillStyle = PAL.white;
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Scatter Mind', WIDTH / 2, 36);
    ctx.fillText('Focus on the TRUE flame nimitta', WIDTH / 2, HEIGHT - 10);
    ctx.textAlign = 'left';
  }
}

function renderJhana1Level() {
  // Darker meditation space
  ctx.fillStyle = '#0d0815';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.save();
  ctx.translate(jh1ShakeX, jh1ShakeY);

  // Nimitta at center
  var nimSz = 18 + Math.sin(gameTime * 2) * 3;
  var nimGrad = ctx.createRadialGradient(jhNimittaX, jhNimittaY, 0, jhNimittaX, jhNimittaY, nimSz * 2);
  nimGrad.addColorStop(0, '#ffe080');
  nimGrad.addColorStop(0.4, 'rgba(200,160,60,0.5)');
  nimGrad.addColorStop(1, 'rgba(100,60,20,0)');
  ctx.fillStyle = nimGrad;
  ctx.beginPath(); ctx.arc(jhNimittaX, jhNimittaY, nimSz * 2, 0, Math.PI * 2); ctx.fill();

  // Hindrance attacks
  var hColors = [PAL.gold, PAL.red, '#606080', '#ff8040', '#8060a0'];
  var hIcons = ['\u2605', '\u2620', 'z', '\u26A1', '?'];
  for (var ai = 0; ai < jh1Attacks.length; ai++) {
    var a = jh1Attacks[ai];
    ctx.globalAlpha = Math.min(a.life, 1);
    ctx.fillStyle = hColors[a.type];
    ctx.font = '16px monospace';
    ctx.fillText(hIcons[a.type], a.x - 6, a.y + 6);
  }

  // Reticle

  ctx.restore();

  // Current hindrance label
  ctx.fillStyle = hColors[jh1HindranceIdx];
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(HINDRANCE_NAMES[jh1HindranceIdx], WIDTH / 2, 20);
  // Focus on nimitta progress
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(WIDTH / 2 - 52, 28, 104, 10);
  ctx.fillStyle = PAL.gold;
  ctx.fillRect(WIDTH / 2 - 50, 30, Math.min(jhFocusOnNimitta / 20 * 100, 100), 6);
  ctx.fillStyle = PAL.whiteD;
  ctx.font = '8px monospace';
  ctx.fillText('Nimitta Focus', WIDTH / 2, 50);
  if (jh1Reversed) ctx.fillText('\u26A0 Controls Reversed!', WIDTH / 2, HEIGHT - 10);
  ctx.textAlign = 'left';
}

function renderJhana2Level() {
  // Soft dark blue
  var bg = Math.floor(20 - jh2NarratorStrength * 0.15);
  ctx.fillStyle = 'rgb(' + Math.max(bg, 2) + ',' + Math.max(bg, 2) + ',' + Math.max(bg + 15, 5) + ')';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Sitting monk at center
  var sitFrame = Math.floor(gameTime / 1.5) % 2;

  // Extended stillness hint

  }
  if (jh2QuietTimer > 8 && jh2NarratorStrength < 5) {
    ctx.fillStyle = 'rgba(200,200,255,' + (0.5 + Math.sin(gameTime * 0.5) * 0.2) + ')';
    ctx.fillText('Almost... just a little longer...', WIDTH / 2, HEIGHT - 38);

}

function renderJhana3Level() {
  // Deep warm dark background
  ctx.fillStyle = '#0d0a06';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Soft ambient glow at bottom — warm hearth feel
  var glowAlpha = 0.06 + (1 - jh3WaveIntensity) * 0.08;
  var grd = ctx.createRadialGradient(WIDTH / 2, HEIGHT / 2, 20, WIDTH / 2, HEIGHT / 2, WIDTH * 0.6);
  grd.addColorStop(0, 'rgba(232,200,64,' + glowAlpha + ')');
  grd.addColorStop(1, 'rgba(13,10,6,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Golden waves — soft horizontal bands of light drifting right
  for (var wi = 0; wi < jh3Waves.length; wi++) {
    var w = jh3Waves[wi];
    var wAlpha = w.alpha * jh3WaveIntensity;
    if (wAlpha < 0.01) continue;

    // Each wave is a soft horizontal gradient band
    var waveY = w.y + Math.sin(gameTime * 0.4 + wi * 1.1) * 8;
    var halfH = w.width * 0.3;

    ctx.globalAlpha = wAlpha;
    var wGrd = ctx.createLinearGradient(w.x - w.width / 2, 0, w.x + w.width / 2, 0);
    wGrd.addColorStop(0, 'rgba(232,200,64,0)');
    wGrd.addColorStop(0.3, 'rgba(232,180,50,0.6)');
    wGrd.addColorStop(0.5, 'rgba(255,220,80,0.8)');
    wGrd.addColorStop(0.7, 'rgba(232,180,50,0.6)');
    wGrd.addColorStop(1, 'rgba(232,200,64,0)');
    ctx.fillStyle = wGrd;
    ctx.fillRect(w.x - w.width / 2, waveY - halfH, w.width, halfH * 2);

    // Secondary softer glow around each wave
    ctx.globalAlpha = wAlpha * 0.3;
    ctx.fillStyle = 'rgba(255,235,180,0.3)';
    ctx.fillRect(w.x - w.width * 0.3, waveY - halfH * 1.5, w.width * 0.6, halfH * 3);
  }
  ctx.globalAlpha = 1;

  // When waves are fading, show a soft residual warm glow across the screen
  if (jh3WaveIntensity < 0.4) {
    var softAlpha = (0.4 - jh3WaveIntensity) * 0.15;
    ctx.fillStyle = 'rgba(255,230,180,' + softAlpha + ')';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
  }

  // Monk / player — a seated saffron dot that breathes
  var breathScale = 1 + Math.sin(gameTime * 1.2) * 0.08;
  var pSize = 6 * breathScale;
  ctx.fillStyle = PAL.saffron;
  ctx.beginPath(); ctx.arc(accReticleX, accReticleY, pSize, 0, Math.PI * 2); ctx.fill();
  // Soft glow around player
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = PAL.gold;
  ctx.beginPath(); ctx.arc(accReticleX, accReticleY, pSize + 6, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // HUD hint
  ctx.fillStyle = PAL.whiteD;
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  var hint = jh3WaveIntensity > 0.5 ? 'Be still. Let the bliss pass.' : (jh3WaveIntensity > 0.2 ? 'The warmth softens...' : 'Peace settles in.');
  ctx.fillText(hint, WIDTH / 2, HEIGHT - 10);
  ctx.textAlign = 'left';
}

function renderJhana4Level() {
  // Pure black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Pendulum
  var pivotX = WIDTH / 2;
  var pivotY = 40;
  var pendLen = HEIGHT * 0.65;
  var bobX = pivotX + Math.sin(jh4Angle) * pendLen;
  var bobY = pivotY + Math.cos(jh4Angle) * pendLen;

  // Thin white line
  var absAngle = Math.abs(jh4Angle);
  var lineAlpha = 0.4 + Math.min(absAngle * 3, 0.6);
  ctx.globalAlpha = lineAlpha;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pivotX, pivotY);
  ctx.lineTo(bobX, bobY);
  ctx.stroke();

  // Small pivot dot
  ctx.fillStyle = '#555555';
  ctx.beginPath(); ctx.arc(pivotX, pivotY, 2, 0, Math.PI * 2); ctx.fill();

  // Bob — small white circle, glows slightly when balanced
  var balanced = absAngle < 0.04;
  var bobRadius = balanced ? 4 : 3;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(bobX, bobY, bobRadius, 0, Math.PI * 2); ctx.fill();

  // Soft glow when very balanced
  if (balanced) {
    ctx.globalAlpha = 0.15 + Math.sin(gameTime * 1.5) * 0.05;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(bobX, bobY, 12, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Center guide — a faint vertical line showing true center
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 6]);
  ctx.beginPath();
  ctx.moveTo(pivotX, pivotY + 10);
  ctx.lineTo(pivotX, pivotY + pendLen + 10);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // Minimal HUD — fades away as balance improves
  var hudAlpha = Math.max(0.5 - jh4BalanceTimer * 0.04, 0);
  if (hudAlpha > 0.01) {
    ctx.globalAlpha = hudAlpha;
    ctx.fillStyle = '#888888';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('gentle corrections only', WIDTH / 2, HEIGHT - 14);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

function renderInfiniteSpaceLevel() {
  ctx.fillStyle = '#020208';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  // Expanding grid of dots — the further you look, the faster they stretch
  var expand = arupa1Speed;
  for (var sx = 0; sx < 20; sx++) {
    for (var sy = 0; sy < 15; sy++) {
      var dx = (sx - 10) * 30 * expand;
      var dy = (sy - 7.5) * 30 * expand;
      var px = WIDTH / 2 + dx;
      var py = HEIGHT / 2 + dy;
      if (px < -10 || px > WIDTH + 10 || py < -10 || py > HEIGHT + 10) continue;
      ctx.globalAlpha = 0.3 / expand;
      ctx.fillStyle = '#4060a0';
      ctx.fillRect(px, py, 2, 2);
    }
  }
  ctx.globalAlpha = 1;
  // Player dot
  ctx.fillStyle = PAL.saffron;
  ctx.beginPath(); ctx.arc(WIDTH / 2, HEIGHT / 2, 4, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = PAL.whiteD;
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Space expands. Stop chasing its edges.', WIDTH / 2, HEIGHT - 10);
  if (arupa1StillTimer > 2) ctx.fillText('Stillness: ' + Math.floor(arupa1StillTimer) + '/8', WIDTH / 2, 20);
  ctx.textAlign = 'left';
}

function renderInfiniteConsciousnessLevel() {
  ctx.fillStyle = '#060310';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Multiple copies of the monk
  var sitFrame = Math.floor(gameTime / 1.5) % 2;

  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Every self is you. Stop distinguishing.', WIDTH / 2, HEIGHT - 10);

}

function renderNothingnessLevel() {
  ctx.fillStyle = '#020202';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Sparse faint particles
  for (var pi = 0; pi < 8; pi++) {
    var px = Math.sin(gameTime * 0.3 + pi * 1.7) * WIDTH * 0.4 + WIDTH / 2;
    var py = Math.cos(gameTime * 0.2 + pi * 2.1) * HEIGHT * 0.4 + HEIGHT / 2;

    ctx.fillRect(px, py, 2, 2);
  }

  // Player — fading
  ctx.globalAlpha = arupa3PlayerAlpha;
  ctx.fillStyle = PAL.saffron;
  ctx.beginPath(); ctx.arc(WIDTH / 2, HEIGHT / 2, 4, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = 'rgba(200,200,200,' + (arupa3PlayerAlpha * 0.5) + ')';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Let go of locating yourself.', WIDTH / 2, HEIGHT - 10);
  ctx.textAlign = 'left';
}

function renderNeitherNorLevel() {
  // Almost nothing — occasional flickers
  ctx.fillStyle = '#010101';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  if (arupa4Flicker > 0.85) {
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = '#202020';
    ctx.fillRect(Math.random() * WIDTH, Math.random() * HEIGHT, 4, 4);
    ctx.globalAlpha = 1;
  }

  // Barely visible hint text
  ctx.globalAlpha = 0.08 + Math.sin(gameTime * 0.5) * 0.04;
  ctx.fillStyle = '#303030';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Do not resist.', WIDTH / 2, HEIGHT / 2);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}
