function renderCessation() {
  var cx_ = WIDTH / 2, cy_ = HEIGHT / 2;
  if (cessationPhase === 0) {
    // Buildup — visual noise increasing over 4 seconds
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    var intensity = cessationTimer / 4.0;
    // Flickering static noise
    ctx.globalAlpha = intensity * 0.4;
    for (var ni = 0; ni < Math.floor(intensity * 80); ni++) {
      var nx = Math.random() * WIDTH;
      var ny = Math.random() * HEIGHT;
      var nc = Math.random() > 0.5 ? '#ffffff' : '#808080';
      ctx.fillStyle = nc;
      ctx.fillRect(nx, ny, 2, 2);
    }
    // Color shifting flashes
    if (intensity > 0.5) {
      ctx.globalAlpha = (intensity - 0.5) * 0.15;
      var flashColors = ['#ff4020', '#2040ff', '#ffff40', '#40ff80'];
      ctx.fillStyle = flashColors[Math.floor(gameTime * 6) % 4];
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
    }
    // Objects flickering — fading saffron shapes
    ctx.globalAlpha = Math.sin(gameTime * 12) * 0.2 * intensity;
    ctx.fillStyle = PAL.saffron;
    ctx.fillRect(cx_ - 30 + Math.sin(gameTime * 5) * 40, cy_ - 20, 16, 16);
    ctx.fillRect(cx_ + 10 + Math.cos(gameTime * 7) * 30, cy_ + 10, 12, 12);
    // Screen shake effect
    if (intensity > 0.7) {
      var shk = (intensity - 0.7) * 10;
      ctx.setTransform(1, 0, 0, 1, (Math.random()-0.5)*shk, (Math.random()-0.5)*shk);
    }
    ctx.globalAlpha = 1;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  } else if (cessationPhase === 1) {
    // Freeze — total stillness, "Let go." fades in
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    var textAlpha = Math.min(cessationTimer / 1.5, 1);
    ctx.globalAlpha = textAlpha;
    ctx.fillStyle = 'rgba(232,224,208,' + textAlpha + ')';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Let go.', cx_, cy_);
    if (cessationTimer > 1.5) {
      ctx.globalAlpha = Math.sin(gameTime * 3) > 0 ? textAlpha * 0.5 : 0;
      ctx.font = '9px monospace';
      ctx.fillText('SPACE', cx_, cy_ + 24);
    }
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  } else if (cessationPhase === 2) {
    // Flash — white burst fading to blank
    var flashAlpha = 1 - (cessationTimer / 0.5);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = Math.max(flashAlpha, 0);
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.globalAlpha = 1;
  } else if (cessationPhase === 3) {
    // Rest — soft grey, no HUD, ambient stillness
    var restFade = Math.min(fruitionRestTimer / 2, 1);
    var grey = Math.floor(40 + restFade * 20);
    ctx.fillStyle = 'rgb(' + grey + ',' + grey + ',' + (grey + 5) + ')';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    // Very faint breath pulse — ambient circle
    ctx.globalAlpha = 0.06 + Math.sin(fruitionRestTimer * 0.8) * 0.03;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(cx_, cy_, 30 + Math.sin(fruitionRestTimer * 0.8) * 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else if (cessationPhase === 4) {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
  }
}

// ======================================================================
// REINCARNATION RENDER
// ======================================================================

function renderSuccumbing() {
  // Animated cutscene when monk gives in to a sensual desire
  var t = succumbTimer;
  var progress = Math.min(t / succumbDuration, 1);
  var cx = WIDTH / 2;
  var cy = HEIGHT / 2;

  // Dark vignette background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Pulsing red/desire-colored border
  var borderColor;
  if (succumbType === 'angulimala') borderColor = 'rgba(200,40,40,';
  else if (succumbType === 'lady') borderColor = 'rgba(220,80,120,';
  else if (succumbType === 'gold') borderColor = 'rgba(230,200,60,';
  else borderColor = 'rgba(220,140,60,';
  var borderAlpha = 0.3 + Math.sin(t * 6) * 0.15;
  ctx.strokeStyle = borderColor + borderAlpha + ')';
  ctx.lineWidth = 6;
  ctx.strokeRect(4, 4, WIDTH - 8, HEIGHT - 8);

  // Screen shake on impact moments
  var shakeX = 0, shakeY = 0;
  if (succumbType === 'angulimala' && t > 0.3 && t < 2.5) {
    var hitPhase = ((t - 0.3) * 4) % 1;
    if (hitPhase < 0.15) { shakeX = (Math.random() - 0.5) * 6; shakeY = (Math.random() - 0.5) * 6; }
  }
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (succumbType === 'angulimala') {
    // === FIGHT ANIMATION ===
    // Monk and Angulimala face off, swords clash, monk falls
    var monkX = cx - 60, monkY = cy - 10;
    var enemyX = cx + 30, enemyY = cy - 10;

    // Phase 1: approach (0-0.8s)
    if (t < 0.8) {
      monkX = cx - 60 - (1 - t / 0.8) * 40;
      enemyX = cx + 30 + (1 - t / 0.8) * 40;
    }
    // Phase 2: clash (0.8-2.2s) — repeated strikes
    if (t >= 0.8 && t < 2.2) {
      var strikePhase = ((t - 0.8) * 3) % 1;
      if (strikePhase < 0.3) {
        // Lunge toward each other
        monkX += strikePhase * 30;
        enemyX -= strikePhase * 30;
      } else if (strikePhase < 0.5) {
        monkX += 9;
        enemyX -= 9;
      } else {
        monkX += (1 - strikePhase) * 18;
        enemyX -= (1 - strikePhase) * 18;
      }
    }
    // Phase 3: monk falls (2.2-3.5s)
    var monkFallen = 0;
    if (t >= 2.2) {
      monkFallen = Math.min((t - 2.2) / 0.8, 1);
      monkY += monkFallen * 20;
    }

    // Draw Angulimala
    // Head
    ctx.fillStyle = '#6b4a2a';
    ctx.fillRect(enemyX + 8, enemyY, 16, 14);
    // Angry red eyes
    ctx.fillStyle = '#cc2020';
    ctx.fillRect(enemyX + 10, enemyY + 4, 4, 3);
    ctx.fillRect(enemyX + 18, enemyY + 4, 4, 3);
    // Brow
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(enemyX + 9, enemyY + 3, 5, 1);
    ctx.fillRect(enemyX + 17, enemyY + 3, 5, 1);
    // Body
    ctx.fillStyle = '#2a2020';
    ctx.fillRect(enemyX + 6, enemyY + 14, 20, 16);
    // Sword — swinging
    var swordAngle = Math.sin(t * 8) * 0.4;
    ctx.save();
    ctx.translate(enemyX + 2, enemyY + 10);
    ctx.rotate(-0.5 + swordAngle);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(-2, -20, 3, 22);
    ctx.fillStyle = '#888';
    ctx.fillRect(-3, -2, 5, 4);
    ctx.restore();
    // Legs
    ctx.fillStyle = '#4a3020';
    ctx.fillRect(enemyX + 10, enemyY + 30, 4, 6);
    ctx.fillRect(enemyX + 18, enemyY + 30, 4, 6);

    // Draw Monk (getting beaten)
    ctx.save();
    if (monkFallen > 0) ctx.rotate(monkFallen * 1.2);
    // Body
    ctx.fillStyle = PAL.saffron;
    ctx.fillRect(monkX + 6, monkY + 14, 20, 16);
    ctx.fillStyle = PAL.saffronD;
    ctx.fillRect(monkX + 8, monkY + 16, 16, 12);
    // Head
    ctx.fillStyle = PAL.skin;
    ctx.fillRect(monkX + 10, monkY + 2, 12, 12);
    ctx.fillStyle = PAL.brown;
    ctx.fillRect(monkX + 10, monkY, 12, 4);
    // Pain expression
    if (t > 0.8) {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(monkX + 12, monkY + 6, 3, 1);
      ctx.fillRect(monkX + 18, monkY + 6, 3, 1);
      ctx.fillStyle = PAL.skinD;
      ctx.fillRect(monkX + 14, monkY + 10, 4, 2);
    } else {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(monkX + 13, monkY + 6, 2, 2);
      ctx.fillRect(monkX + 18, monkY + 6, 2, 2);
    }
    // Fists up
    ctx.fillStyle = PAL.skin;
    if (t < 2.2) {
      var fistOff = Math.sin(t * 8) * 4;
      ctx.fillRect(monkX + 2, monkY + 12 + fistOff, 5, 5);
      ctx.fillRect(monkX + 25, monkY + 12 - fistOff, 5, 5);
    }
    ctx.restore();

    // Clash sparks
    if (t >= 0.8 && t < 2.2) {
      var sparkPhase = ((t - 0.8) * 3) % 1;
      if (sparkPhase < 0.2) {
        ctx.fillStyle = '#ffcc00';
        for (var si = 0; si < 5; si++) {
          ctx.fillRect(cx - 4 + Math.sin(si * 2.1 + t * 10) * 12, cy - 4 + Math.cos(si * 1.7 + t * 10) * 12, 3, 3);
        }
      }
    }

    // Blood splatter when fallen
    if (monkFallen > 0.5) {
      ctx.fillStyle = 'rgba(180,30,30,' + (monkFallen - 0.5) * 1.5 + ')';
      ctx.fillRect(monkX + 10, monkY + 20, 12, 3);
      ctx.fillRect(monkX + 6, monkY + 24, 8, 2);
    }

    // Caption
    ctx.fillStyle = 'rgba(200,40,40,' + Math.min(t / 0.5, 1) + ')';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    if (t < 0.8) ctx.fillText('You face Angulimala...', cx, HEIGHT - 20);
    else if (t < 2.2) ctx.fillText('\u2694 FIGHTING! \u2694', cx, HEIGHT - 20);
    else ctx.fillText('You have been defeated...', cx, HEIGHT - 20);

  } else if (succumbType === 'lady') {
    // === SEDUCTION ANIMATION ===
    var monkX = cx - 50, monkY = cy - 5;
    var ladyX = cx + 20, ladyY = cy - 5;

    // Phase 1: hypnotized approach (0-1.2s)
    if (t < 1.2) {
      monkX -= (1 - t / 1.2) * 30;
      ladyX += (1 - t / 1.2) * 20;
    }
    // Phase 2: embrace (1.2-2.5s)
    if (t >= 1.2 && t < 2.5) {
      var embraceT = (t - 1.2) / 1.3;
      monkX += embraceT * 15;
      ladyX -= embraceT * 10;
    }
    // Phase 3: engulfed (2.5-3.5s)
    if (t >= 2.5) {
      monkX = cx - 15;
      ladyX = cx - 5;
    }

    // Draw lady
    // Hair
    ctx.fillStyle = '#1a0a0a';
    ctx.fillRect(ladyX + 6, ladyY - 2, 20, 10);
    ctx.fillRect(ladyX + 4, ladyY + 6, 24, 12);
    // Face
    ctx.fillStyle = '#ddb888';
    ctx.fillRect(ladyX + 10, ladyY + 2, 12, 10);
    // Eyes — beckoning
    ctx.fillStyle = '#2a4a1a';
    ctx.fillRect(ladyX + 12, ladyY + 5, 3, 2);
    ctx.fillRect(ladyX + 18, ladyY + 5, 3, 2);
    // Lips
    ctx.fillStyle = '#dd2020';
    ctx.fillRect(ladyX + 13, ladyY + 9, 6, 2);
    // Red dress
    ctx.fillStyle = '#cc2020';
    ctx.fillRect(ladyX + 8, ladyY + 16, 16, 16);
    ctx.fillStyle = '#ddb888';
    ctx.fillRect(ladyX + 13, ladyY + 16, 6, 4);
    // Arms reaching out
    ctx.fillStyle = '#ddb888';
    if (t >= 1.2) {
      ctx.fillRect(ladyX + 2, ladyY + 16, 6, 4);
      ctx.fillRect(ladyX + 24, ladyY + 16, 6, 4);
    }

    // Draw monk — progressively entranced
    // Body
    ctx.fillStyle = PAL.saffron;
    ctx.fillRect(monkX + 6, monkY + 14, 20, 16);
    ctx.fillStyle = PAL.saffronD;
    ctx.fillRect(monkX + 8, monkY + 16, 16, 12);
    // Head
    ctx.fillStyle = PAL.skin;
    ctx.fillRect(monkX + 10, monkY + 2, 12, 12);
    ctx.fillStyle = PAL.brown;
    ctx.fillRect(monkX + 10, monkY, 12, 4);
    // Eyes — heart-shaped when close
    if (t < 1.2) {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(monkX + 13, monkY + 6, 2, 2);
      ctx.fillRect(monkX + 18, monkY + 6, 2, 2);
    } else {
      ctx.fillStyle = '#ff3060';
      ctx.fillRect(monkX + 12, monkY + 5, 3, 3);
      ctx.fillRect(monkX + 18, monkY + 5, 3, 3);
    }

    // Floating hearts
    ctx.fillStyle = '#ff4070';
    ctx.font = '12px monospace';
    for (var hi = 0; hi < 6; hi++) {
      var hx = cx + Math.sin(t * 2 + hi * 1.5) * 50;
      var hy = cy - 30 - hi * 12 + Math.sin(t * 3 + hi) * 8;
      ctx.globalAlpha = 0.4 + Math.sin(t * 2.5 + hi) * 0.25;
      ctx.fillText('\u2764', hx, hy);
    }
    ctx.globalAlpha = 1;

    // Embrace glow when merged
    if (t >= 2.5) {
      var glowAlpha = Math.min((t - 2.5) / 0.5, 0.4);
      ctx.fillStyle = 'rgba(255,80,120,' + glowAlpha + ')';
      ctx.beginPath();
      ctx.arc(cx, cy + 10, 30 + Math.sin(t * 4) * 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Caption
    ctx.fillStyle = 'rgba(220,80,120,' + Math.min(t / 0.5, 1) + ')';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    if (t < 1.2) ctx.fillText('Her gaze pulls you in...', cx, HEIGHT - 20);
    else if (t < 2.5) ctx.fillText('\u2764 Embracing desire... \u2764', cx, HEIGHT - 20);
    else ctx.fillText('Lost in passion...', cx, HEIGHT - 20);

  } else if (succumbType === 'gold') {
    // === GRABBING GOLD ANIMATION ===
    var monkX = cx - 10, monkY = cy - 20;
    var goldX = cx - 15, goldY = cy + 10;

    // Phase 1: eyes gleaming, approach (0-1s)
    if (t < 1.0) {
      monkY -= (1 - t / 1.0) * 30;
    }
    // Phase 2: scooping gold frantically (1-2.5s)
    // Phase 3: buried in gold (2.5-3.5s)

    // Gold pile — gets bigger as monk adds to it
    var pileSize = t < 1.0 ? 1 : Math.min(1 + (t - 1.0) * 0.6, 2.0);
    ctx.fillStyle = '#e8c840';
    ctx.fillRect(goldX - 10 * pileSize, goldY, 30 * pileSize, 10 * pileSize);
    ctx.fillRect(goldX - 5 * pileSize, goldY - 6 * pileSize, 20 * pileSize, 8 * pileSize);
    // Highlights
    ctx.fillStyle = '#fff8c0';
    ctx.fillRect(goldX, goldY - 4 * pileSize, 4, 3);
    ctx.fillRect(goldX + 10, goldY + 2, 3, 2);
    // Coins scattered
    ctx.fillStyle = '#c8a020';
    for (var ci = 0; ci < 6; ci++) {
      ctx.beginPath();
      ctx.arc(goldX - 20 + ci * 12 + Math.sin(ci + t) * 3, goldY + 14 + Math.sin(ci * 2.3) * 4, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw monk
    // Body
    ctx.fillStyle = PAL.saffron;
    ctx.fillRect(monkX + 2, monkY + 14, 20, 16);
    ctx.fillStyle = PAL.saffronD;
    ctx.fillRect(monkX + 4, monkY + 16, 16, 12);
    // Head
    ctx.fillStyle = PAL.skin;
    ctx.fillRect(monkX + 6, monkY + 2, 12, 12);
    ctx.fillStyle = PAL.brown;
    ctx.fillRect(monkX + 6, monkY, 12, 4);
    // Greedy eyes — dollar signs
    ctx.fillStyle = '#e8c840';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('$', monkX + 10, monkY + 10);
    ctx.fillText('$', monkX + 17, monkY + 10);
    // Grinning mouth
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(monkX + 10, monkY + 11, 6, 2);
    ctx.fillStyle = '#e8e0d0';
    ctx.fillRect(monkX + 11, monkY + 11, 4, 1);

    // Scooping arms animation
    if (t >= 1.0 && t < 2.5) {
      var scoopPhase = ((t - 1.0) * 4) % 1;
      ctx.fillStyle = PAL.skin;
      var armY = monkY + 20 + Math.sin(scoopPhase * Math.PI * 2) * 8;
      ctx.fillRect(monkX - 4, armY, 6, 4);
      ctx.fillRect(monkX + 22, armY + 2, 6, 4);
      // Gold coins flying up
      if (scoopPhase < 0.3) {
        ctx.fillStyle = '#e8c840';
        for (var gi = 0; gi < 3; gi++) {
          ctx.fillRect(monkX + 8 + gi * 6, monkY + 16 - scoopPhase * 20, 3, 3);
        }
      }
    }

    // Monk sinking into gold pile at end
    if (t >= 2.5) {
      var sinkT = (t - 2.5) / 1.0;
      ctx.fillStyle = '#e8c840';
      ctx.fillRect(goldX - 25, goldY - 10 + sinkT * 5, 60, 20);
      ctx.globalAlpha = 1 - sinkT * 0.5;
    }

    // Sparkle everywhere
    ctx.fillStyle = '#ffffff';
    for (var spi = 0; spi < 8; spi++) {
      if (Math.sin(t * 6 + spi * 1.3) > 0.6) {
        ctx.fillRect(cx - 50 + spi * 14 + Math.sin(t + spi) * 5, cy - 30 + Math.cos(spi * 2.1 + t) * 25, 2, 2);
      }
    }
    ctx.globalAlpha = 1;

    // Caption
    ctx.fillStyle = 'rgba(230,200,60,' + Math.min(t / 0.5, 1) + ')';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    if (t < 1.0) ctx.fillText('The gold calls to you...', cx, HEIGHT - 20);
    else if (t < 2.5) ctx.fillText('\ud83d\udcb0 Grabbing! Scooping! MINE! \ud83d\udcb0', cx, HEIGHT - 20);
    else ctx.fillText('Buried in treasure... forever...', cx, HEIGHT - 20);

  } else if (succumbType === 'food') {
    // === EATING ANIMATION ===
    var monkX = cx - 10, monkY = cy - 20;
    var tableX = cx - 20, tableY = cy + 8;

    // Phase 1: approach table (0-0.8s)
    if (t < 0.8) {
      monkY -= (1 - t / 0.8) * 25;
    }

    // Table
    ctx.fillStyle = '#8b6b3a';
    ctx.fillRect(tableX - 10, tableY + 8, 50, 8);
    ctx.fillStyle = '#6b4a2a';
    ctx.fillRect(tableX - 6, tableY + 16, 4, 8);
    ctx.fillRect(tableX + 32, tableY + 16, 4, 8);

    // Food on table — disappears as monk eats
    var foodLeft = t < 0.8 ? 1 : Math.max(1 - (t - 0.8) / 2.0, 0);
    ctx.globalAlpha = foodLeft;
    // Rice bowl
    ctx.fillStyle = '#6b4a2a';
    ctx.fillRect(tableX - 6, tableY, 12, 10);
    ctx.fillStyle = '#e8e0d0';
    ctx.fillRect(tableX - 5, tableY, 10, 6);
    // Curry
    ctx.fillStyle = '#6b4a2a';
    ctx.fillRect(tableX + 14, tableY, 12, 10);
    ctx.fillStyle = '#c87040';
    ctx.fillRect(tableX + 15, tableY, 10, 6);
    // Fruit
    ctx.fillStyle = '#cc3030';
    ctx.beginPath(); ctx.arc(tableX + 34, tableY + 4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e8c840';
    ctx.beginPath(); ctx.arc(tableX + 42, tableY + 4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    // Draw monk — eating frantically
    // Body (gets fatter!)
    var fatness = t < 0.8 ? 0 : Math.min((t - 0.8) / 2.5, 1) * 8;
    ctx.fillStyle = PAL.saffron;
    ctx.fillRect(monkX + 2 - fatness / 2, monkY + 14, 20 + fatness, 16 + fatness / 2);
    ctx.fillStyle = PAL.saffronD;
    ctx.fillRect(monkX + 4 - fatness / 2, monkY + 16, 16 + fatness, 12 + fatness / 2);
    // Head
    ctx.fillStyle = PAL.skin;
    ctx.fillRect(monkX + 6, monkY + 2, 12, 12);
    ctx.fillStyle = PAL.brown;
    ctx.fillRect(monkX + 6, monkY, 12, 4);
    // Mouth — chomping animation
    if (t >= 0.8) {
      var chompOpen = Math.sin(t * 12) > 0;
      ctx.fillStyle = '#1a1a1a';
      if (chompOpen) {
        ctx.fillRect(monkX + 10, monkY + 9, 6, 4);
        ctx.fillStyle = '#cc3030';
        ctx.fillRect(monkX + 11, monkY + 10, 4, 2);
      } else {
        ctx.fillRect(monkX + 10, monkY + 10, 6, 2);
      }
      // Happy squinting eyes
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(monkX + 9, monkY + 6, 3, 1);
      ctx.fillRect(monkX + 15, monkY + 6, 3, 1);
    } else {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(monkX + 10, monkY + 6, 2, 2);
      ctx.fillRect(monkX + 15, monkY + 6, 2, 2);
    }

    // Crumbs flying
    if (t >= 0.8) {
      ctx.fillStyle = '#d4b080';
      for (var crumb = 0; crumb < 5; crumb++) {
        var crumbT = (t * 3 + crumb * 0.7) % 1;
        ctx.fillRect(monkX + 8 + Math.sin(crumb * 3.1 + t * 4) * 15, monkY + 12 + crumbT * 20, 2, 2);
      }
    }

    // Food emojis raining down
    ctx.font = '12px monospace';
    var foods = ['\ud83c\udf5a','\ud83c\udf5b','\ud83c\udf4e','\ud83c\udf57','\ud83c\udf5c'];
    for (var fi = 0; fi < 5; fi++) {
      var fx = cx - 60 + fi * 30 + Math.sin(t * 2 + fi) * 10;
      var fy = ((t * 40 + fi * 60) % (HEIGHT + 20)) - 10;
      ctx.globalAlpha = 0.5;
      ctx.fillText(foods[fi], fx, fy);
    }
    ctx.globalAlpha = 1;

    // Caption
    ctx.fillStyle = 'rgba(220,140,60,' + Math.min(t / 0.5, 1) + ')';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    if (t < 0.8) ctx.fillText('The feast is irresistible...', cx, HEIGHT - 20);
    else if (t < 2.5) ctx.fillText('\ud83c\udf5a NOM NOM NOM NOM \ud83c\udf5a', cx, HEIGHT - 20);
    else ctx.fillText('Can\'t... stop... eating...', cx, HEIGHT - 20);
  }

  ctx.restore();
  ctx.textAlign = 'left';
}

function renderReincarnation() {
  var fade = Math.min(reincarnTimer / 1.5, 1);
  var cx_ = WIDTH / 2;
  var cy_ = HEIGHT / 2;
  ctx.textAlign = 'center';

  // Cause-specific rebirth scenes
  if (lastDeathCause === 'craving') {
    // Hungry Ghost — thin ghost with long arms, bowl/fruit out of reach
    ctx.fillStyle = '#0a0808';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    // Hollow wind background streaks
    ctx.globalAlpha = fade * 0.1;
    ctx.strokeStyle = '#303030';
    ctx.lineWidth = 1;
    for (var wi = 0; wi < 8; wi++) {
      var wy = 40 + wi * 40 + Math.sin(gameTime * 0.5 + wi) * 10;
      ctx.beginPath(); ctx.moveTo(0, wy); ctx.lineTo(WIDTH, wy + 5); ctx.stroke();
    }
    ctx.globalAlpha = fade;
    // Thin ghost figure
    ctx.fillStyle = '#505060';
    ctx.fillRect(cx_ - 4, cy_ - 30, 8, 40); // thin body
    ctx.fillRect(cx_ - 3, cy_ - 38, 6, 10); // head
    // Long reaching arms
    var armReach = Math.sin(gameTime * 2) * 8;
    ctx.fillRect(cx_ - 30 - armReach, cy_ - 20, 28 + armReach, 3); // left arm
    ctx.fillRect(cx_ + 4, cy_ - 20, 28 + armReach, 3); // right arm
    // Bony fingers
    for (var fi = 0; fi < 3; fi++) {
      ctx.fillRect(cx_ - 32 - armReach + fi * 4, cy_ - 22, 2, 6);
      ctx.fillRect(cx_ + 30 + armReach + fi * 4, cy_ - 22, 2, 6);
    }
    // Sunken eyes
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx_ - 2, cy_ - 36, 2, 2);
    ctx.fillRect(cx_ + 2, cy_ - 36, 2, 2);
    // Open mouth (tiny)
    ctx.fillRect(cx_ - 1, cy_ - 32, 2, 2);
    // Bowl just out of reach
    var bowlX = cx_ + 50 + Math.sin(gameTime * 1.5) * 15;
    ctx.fillStyle = '#8b6b3a';
    ctx.fillRect(bowlX - 8, cy_ - 24, 16, 8);
    ctx.fillStyle = '#e8e0d0';
    ctx.fillRect(bowlX - 6, cy_ - 24, 12, 4);
    // Text
    ctx.fillStyle = 'rgba(200,180,160,' + fade + ')';
    ctx.font = '12px monospace';
    ctx.fillText('Hungry Ghost.', cx_, cy_ + 30);
    ctx.font = '10px monospace';
    ctx.fillText('Always reaching.', cx_, cy_ + 48);
    ctx.fillText('Never filled.', cx_, cy_ + 64);

  } else if (lastDeathCause === 'anger') {
    // Burning figure — red-black flashing background
    var flashPhase = Math.sin(gameTime * 8) > 0;
    ctx.fillStyle = flashPhase ? '#1a0000' : '#0a0000';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.globalAlpha = fade;
    // Burning figure
    ctx.fillStyle = '#cc4020';
    ctx.fillRect(cx_ - 6, cy_ - 20, 12, 30); // body
    ctx.fillRect(cx_ - 4, cy_ - 28, 8, 10); // head
    // Flames around figure
    for (var fl = 0; fl < 6; fl++) {
      var flx = cx_ - 16 + fl * 6 + Math.sin(gameTime * 6 + fl) * 3;
      var fly = cy_ - 10 - Math.abs(Math.sin(gameTime * 4 + fl * 1.3)) * 20;
      var flh = 8 + Math.sin(gameTime * 5 + fl * 2) * 4;
      ctx.fillStyle = fl % 2 === 0 ? '#ff6020' : '#ffaa40';
      ctx.fillRect(flx, fly, 4, flh);
    }
    // Dark eyes
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx_ - 3, cy_ - 26, 2, 2);
    ctx.fillRect(cx_ + 1, cy_ - 26, 2, 2);
    // Text
    ctx.fillStyle = 'rgba(200,80,40,' + fade + ')';
    ctx.font = '12px monospace';
    ctx.fillText('Burning in what was grasped.', cx_, cy_ + 30);

  } else if (lastDeathCause === 'sloth') {
    // Dim animal curled on ground — heavy grey palette
    ctx.fillStyle = '#080808';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.globalAlpha = fade * 0.7;
    // Curled animal shape (bear/cat-like)
    ctx.fillStyle = '#404040';
    ctx.beginPath();
    ctx.arc(cx_, cy_, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(cx_ - 10, cy_ - 12, 8, 0, Math.PI * 2);
    ctx.fill();
    // Closed eyes
    ctx.fillStyle = '#222';
    ctx.fillRect(cx_ - 13, cy_ - 12, 4, 1);
    ctx.fillRect(cx_ - 8, cy_ - 12, 4, 1);
    // Muffled ground
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, cy_ + 22, WIDTH, HEIGHT - cy_ - 22);
    ctx.globalAlpha = fade;
    // Text
    ctx.fillStyle = 'rgba(120,120,120,' + fade + ')';
    ctx.font = '12px monospace';
    ctx.fillText('Sunk in dullness.', cx_, cy_ + 50);

  } else if (lastDeathCause === 'restlessness') {
    // Monkey leaping branch to branch — quick animation
    ctx.fillStyle = '#0a0808';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.globalAlpha = fade;
    // Branches
    ctx.fillStyle = '#4a3020';
    ctx.fillRect(40, cy_ - 10, 120, 4);
    ctx.fillRect(WIDTH - 160, cy_ - 20, 120, 4);
    ctx.fillRect(80, cy_ + 30, 100, 4);
    // Monkey — bouncing between branches
    var monkeyPhase = (gameTime * 3) % 3;
    var mx, my;
    if (monkeyPhase < 1) { mx = 80 + monkeyPhase * 100; my = cy_ - 20 + Math.sin(monkeyPhase * Math.PI) * -30; }
    else if (monkeyPhase < 2) { mx = 180 + (monkeyPhase - 1) * 100; my = cy_ - 30 + Math.sin((monkeyPhase - 1) * Math.PI) * -25; }
    else { mx = 280 + (monkeyPhase - 2) * -200; my = cy_ + 20 + Math.sin((monkeyPhase - 2) * Math.PI) * -35; }
    // Monkey body
    ctx.fillStyle = '#8b6b3a';
    ctx.fillRect(mx - 6, my - 6, 12, 10);
    ctx.fillRect(mx - 4, my - 12, 8, 8);
    // Tail
    ctx.strokeStyle = '#6b4a2a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(mx + 6, my + 2);
    ctx.quadraticCurveTo(mx + 18, my - 10, mx + 14, my - 18);
    ctx.stroke();
    // Eyes (wide, darting)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(mx - 3, my - 10, 3, 2);
    ctx.fillRect(mx + 1, my - 10, 3, 2);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(mx - 2 + Math.sin(gameTime * 8), my - 10, 1, 2);
    ctx.fillRect(mx + 2 + Math.sin(gameTime * 8), my - 10, 1, 2);
    // Text
    ctx.fillStyle = 'rgba(200,160,80,' + fade + ')';
    ctx.font = '12px monospace';
    ctx.fillText('Never still.', cx_, cy_ + 60);
    ctx.fillText('Never settled.', cx_, cy_ + 78);

  } else if (lastDeathCause === 'doubt') {
    // Bird turning left and right, two identical doors
    ctx.fillStyle = '#080810';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.globalAlpha = fade;
    // Two identical doors
    ctx.fillStyle = '#4a3a2a';
    ctx.fillRect(cx_ - 80, cy_ - 20, 30, 50);
    ctx.fillRect(cx_ + 50, cy_ - 20, 30, 50);
    // Door details
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(cx_ - 75, cy_ - 15, 20, 40);
    ctx.fillRect(cx_ + 55, cy_ - 15, 20, 40);
    // Identical signs above doors
    ctx.fillStyle = '#8b7355';
    ctx.fillRect(cx_ - 78, cy_ - 30, 26, 8);
    ctx.fillRect(cx_ + 52, cy_ - 30, 26, 8);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = '6px monospace';
    ctx.fillText('?', cx_ - 65, cy_ - 23);
    ctx.fillText('?', cx_ + 65, cy_ - 23);
    // Bird in center, head turning
    var birdTurn = Math.sin(gameTime * 3);
    ctx.fillStyle = '#6b6b4a';
    ctx.fillRect(cx_ - 5, cy_ + 5, 10, 8); // body
    ctx.fillRect(cx_ - 3 + birdTurn * 5, cy_ - 2, 6, 8); // head
    // Eye
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx_ - 1 + birdTurn * 6, cy_, 2, 2);
    // Beak
    ctx.fillStyle = '#c8a020';
    ctx.fillRect(cx_ + (birdTurn > 0 ? 4 : -5) + birdTurn * 5, cy_ + 2, 4, 2);
    // Tail
    ctx.fillStyle = '#5a5a3a';
    ctx.fillRect(cx_ - 8, cy_ + 8, 6, 4);
    // Text
    ctx.fillStyle = 'rgba(140,140,180,' + fade + ')';
    ctx.font = '12px monospace';
    ctx.fillText('Turning this way and that.', cx_, cy_ + 50);

  } else {
    // Default/generic rebirth (fallback)
    ctx.fillStyle = '#1a0a0a';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    // Swirling samsara circle
    ctx.save();
    ctx.translate(cx_, cy_ - 30);
    ctx.rotate(reincarnTimer * 0.5);
    ctx.globalAlpha = fade * 0.2;
    ctx.strokeStyle = PAL.saffron;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 60 + Math.sin(reincarnTimer * 2) * 10, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 40 + Math.cos(reincarnTimer * 3) * 8, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = fade;
    ctx.fillStyle = 'rgba(232,224,208,' + fade + ')';
    ctx.font = '12px monospace';
    ctx.fillText(reincarnAs, cx_, cy_ - 10);
    ctx.font = '10px monospace';
    ctx.fillText(reincarnDesc, cx_, cy_ + 20);
  }

  ctx.globalAlpha = 1;
  if (reincarnTimer > 1.5 && !levelMenuActive) {
    var timeLeft = Math.max(0, 3 - reincarnTimer);
    ctx.fillStyle = 'rgba(232, 200, 100, 0.9)';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL MENU OPENS IN: ' + Math.ceil(timeLeft) + 's', cx_, HEIGHT - 30);
    ctx.font = '9px monospace';
    ctx.fillStyle = 'rgba(184,176,160,0.8)';
    ctx.fillText('(or press SPACE now)', cx_, HEIGHT - 16);
  }
  
  // Render level menu as a Buddhist path
  if (levelMenuActive) {
    ctx.fillStyle = 'rgba(0,0,0,0.95)';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    
    // Draw a path/journey theme
    ctx.strokeStyle = 'rgba(232,196,100,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx_ - 80, HEIGHT - 60);
    ctx.quadraticCurveTo(cx_, 80, cx_ + 80, 40);
    ctx.stroke();
    
    ctx.fillStyle = PAL.white;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('THE PATH OF CALM', cx_, 30);
    
    ctx.font = '9px monospace';
    ctx.fillStyle = PAL.whiteD;
    ctx.fillText('Choose where to continue your journey', cx_, 50);
    
    // Level list as waypoints on the path
    const levelNames = [
      'Monastery: Chores',
      'Village: Alms & Restraint',
      'Forest: Insights',
      'Access Concentration',
      'Kasina Training',
      '1st Jhāna',
      '2nd Jhāna',
      '3rd Jhāna',
      '4th Jhāna',
      'Formless I: Infinite Space',
      'Formless II: Infinite Consciousness',
      'Formless III: Nothingness',
      'Formless IV: Neither-Nor'
    ];
    
    const startY = 75;
    const lineHeight = 16;
    let pathY = 65;
    
    for (let i = 0; i <= deathLevel && i < levelNames.length; i++) {
      const y = startY + i * lineHeight;
      pathY = y;
      
      if (i === menuSelectedLevel) {
        // Highlight current selection
        ctx.fillStyle = PAL.saffron;
        ctx.beginPath();
        ctx.arc(cx_ - 100, y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = PAL.saffron;
        ctx.font = 'bold 10px monospace';
        ctx.fillText('◆ ' + levelNames[i], cx_, y + 4);
      } else {
        // Passed waypoints
        ctx.fillStyle = i < deathLevel ? PAL.gold : '#666666';
        ctx.beginPath();
        ctx.arc(cx_ - 100, y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = i < deathLevel ? PAL.whiteD : '#555555';
        ctx.font = '9px monospace';
        ctx.fillText('○ ' + levelNames[i], cx_, y + 3);
      }
    }
    
    // Instructions at bottom
    ctx.fillStyle = PAL.whiteD;
    ctx.font = '8px monospace';
    ctx.fillText('[UP/DOWN] choose | [SPACE] go | [Q] quit', cx_, HEIGHT - 20);
  }
  
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

function renderTransition() {
  ctx.fillStyle = 'rgba(0,0,0,' + transitionAlpha + ')';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  if (transitionAlpha > 0.5 && transitionText) {
    ctx.fillStyle = 'rgba(255,255,255,' + ((transitionAlpha - 0.5) * 2) + ')';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    const lines = transitionText.split('\n');
    lines.forEach((line, i) => {
      ctx.fillText(line, WIDTH / 2, HEIGHT / 2 - 10 + i * 20);
    });
    ctx.textAlign = 'left';
  }
}

function renderTitle() {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  for (let i = 0; i < 5; i++) {
    const tx = 40 + i * 90;
    const ty = 80 + Math.sin(gameTime * 0.3 + i) * 5;
    ctx.fillStyle = PAL.barkD;
    ctx.fillRect(tx + 12, ty + 20, 8, 20);
    ctx.fillStyle = PAL.forestD;
    ctx.fillRect(tx, ty, 32, 22);
    ctx.fillStyle = PAL.forest;
    ctx.fillRect(tx + 4, ty + 4, 24, 16);
  }

  ctx.fillStyle = PAL.saffron;
  ctx.font = '24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Path of Calm', WIDTH / 2, 160);

  ctx.fillStyle = PAL.whiteD;
  ctx.font = '10px monospace';
  ctx.fillText('A Therav\u0101da meditation game', WIDTH / 2, 185);

  // Zen quote
  ctx.fillStyle = PAL.goldD;
  ctx.font = '8px monospace';
  ctx.globalAlpha = 0.5 + Math.sin(gameTime * 0.8) * 0.2;
  ctx.fillText('"Before enlightenment: chop wood, carry water."', WIDTH / 2, 130);
  ctx.globalAlpha = 1;

  const monkSprite = getCachedSprite('monk_title', MONK_DOWN_1, MONK_PAL);
  ctx.drawImage(monkSprite, WIDTH / 2 - 16, 200);

  ctx.fillStyle = PAL.white;
  ctx.font = '10px monospace';
  if (Math.sin(gameTime * 3) > 0) ctx.fillText('Press SPACE to begin', WIDTH / 2, 270);

  ctx.fillStyle = PAL.whiteD;
  ctx.font = '9px monospace';
  ctx.fillText('Arrow keys: Move', WIDTH / 2, 295);
  ctx.fillText('SPACE: Interact / Re-center', WIDTH / 2, 310);
  ctx.textAlign = 'left';

  ctx.fillStyle = PAL.candle;
  ctx.globalAlpha = 0.3 + Math.sin(gameTime * 5) * 0.1;
  ctx.fillRect(WIDTH / 2 - 2, 192, 4, 6);
  ctx.globalAlpha = 1;
}

function renderEnding() {
  ctx.fillStyle = PAL.black;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  ctx.textAlign = 'center';
  for (let i = 0; i <= endingLineIndex; i++) {
    if (i >= endingLines.length) break;
    const line = endingLines[i];
    const alpha = Math.min((endingTimer - i * 2.5) / 1.5, 1);
    if (alpha <= 0) continue;

    const yPos = 80 + i * 28;

    if (line === '~~The End~~') {
      // Draw "The End" with a strikethrough
      ctx.fillStyle = 'rgba(184,176,160,' + alpha * 0.5 + ')';
      ctx.font = '12px monospace';
      ctx.fillText('The End', WIDTH / 2, yPos);
      const tw = ctx.measureText('The End').width;
      ctx.strokeStyle = 'rgba(184,176,160,' + alpha * 0.7 + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(WIDTH / 2 - tw / 2, yPos - 4);
      ctx.lineTo(WIDTH / 2 + tw / 2, yPos - 4);
      ctx.stroke();
    } else if (line === 'The Now.') {
      ctx.fillStyle = 'rgba(232,145,42,' + alpha + ')';
      ctx.font = '14px monospace';
      ctx.fillText(line, WIDTH / 2, yPos);
    } else if (line === '~ Path of Calm ~' || line === '~ Nibb\u0101na ~') {
      ctx.fillStyle = 'rgba(232,145,42,' + alpha + ')';
      ctx.font = '14px monospace';
      ctx.fillText(line, WIDTH / 2, yPos);
    } else if (line.startsWith('Press')) {
      ctx.fillStyle = 'rgba(184,176,160,' + (Math.sin(gameTime * 3) > 0 ? alpha * 0.7 : 0) + ')';
      ctx.font = '10px monospace';
      ctx.fillText(line, WIDTH / 2, yPos);
    } else {
      ctx.fillStyle = 'rgba(232,224,208,' + alpha + ')';
      ctx.font = '12px monospace';
      ctx.fillText(line, WIDTH / 2, yPos);
    }
  }
  ctx.textAlign = 'left';
}

// ======================================================================
// GAME LOOP
// ======================================================================

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);

window.addEventListener('resize', () => {
  const s = Math.min(Math.floor(window.innerWidth / WIDTH), Math.floor(window.innerHeight / HEIGHT), 3) || 1;
  canvas.style.width = WIDTH * s + 'px';
  canvas.style.height = HEIGHT * s + 'px';
});

// ======================================================================
// MOBILE CONTROLS
// ======================================================================

// Button controls - lotus button only
const interactBtn = document.getElementById('interactBtn');

if (interactBtn) {
  const onDown = (e) => {
    e.preventDefault();
    e.stopPropagation();
    interactBtn.classList.add('pressed');
    keys[' '] = true;
  };

  const onUp = (e) => {
    e.preventDefault();
    e.stopPropagation();
    interactBtn.classList.remove('pressed');
    keys[' '] = false;
  };

  // Mouse events
  interactBtn.addEventListener('mousedown', onDown);
  interactBtn.addEventListener('mouseup', onUp);
  interactBtn.addEventListener('mouseleave', onUp);

  // Touch events - bind to button itself for better multi-touch support
  interactBtn.addEventListener('touchstart', onDown, { passive: false });
  interactBtn.addEventListener('touchend', onUp, { passive: false });
  interactBtn.addEventListener('touchcancel', onUp, { passive: false });

  // Prevent default touch behavior
  interactBtn.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
}

// Hide controls on desktop if keyboard is being used
let lastKeyboardTime = 0;
window.addEventListener('keydown', () => {
  lastKeyboardTime = Date.now();
});

// Optional: Show/hide controls based on screen size
function updateControlsVisibility() {
  const controls = document.getElementById('controls');
  // Always show controls on mobile devices
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  if (isMobile) {
    controls.style.display = 'flex';
  }
}

updateControlsVisibility();
window.addEventListener('resize', updateControlsVisibility);

// ======================================================================
// TAP-TO-MOVE on canvas
// ======================================================================

function getCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) / SCALE;
  const y = (clientY - rect.top) / SCALE;
  return { x: Math.max(0, Math.min(x, WIDTH)), y: Math.max(0, Math.min(y, HEIGHT)) };
}

canvas.addEventListener('touchstart', (e) => {
  if (gameState !== 'playing' || e.touches.length === 0) return;
  const touch = e.touches[0];
  const coords = getCanvasCoords(touch.clientX, touch.clientY);
  // Only set tap target if tapping on canvas (not on controls below)
  if (coords.y < HEIGHT) {
    e.preventDefault();
    tapTarget = coords;
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (gameState !== 'playing') return;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  if (gameState !== 'playing') return;
  const coords = getCanvasCoords(e.clientX, e.clientY);
  tapTarget = coords;
});

</script>
