      o.frequency.setValueAtTime(1200 + Math.random() * 400, now);
      o.frequency.exponentialRampToValueAtTime(1800 + Math.random() * 400, now + 0.08);
      o.frequency.exponentialRampToValueAtTime(1400 + Math.random() * 300, now + 0.15);
      o.frequency.exponentialRampToValueAtTime(2000 + Math.random() * 300, now + 0.22);
      g.gain.setValueAtTime(0.08, now);
      g.gain.linearRampToValueAtTime(0.1, now + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now + 0.3);
    }
  } else {
    // Wind — full screen effect
    ev.x = WIDTH / 2;
    ev.y = HEIGHT / 2;
    notingWindAlpha = 0.6;
    notingWindDir = Math.random() < 0.5 ? -1 : 1;
    // Play wind whoosh
    if (audioCtx) {
      var now2 = audioCtx.currentTime;
      var buf = createNoise(0.6, 0.5);
      var src = audioCtx.createBufferSource();
      src.buffer = buf;
      var filt = audioCtx.createBiquadFilter();
      filt.type = 'bandpass'; filt.frequency.value = 600; filt.Q.value = 0.8;
      var wg = audioCtx.createGain();
      wg.gain.setValueAtTime(0, now2);
      wg.gain.linearRampToValueAtTime(0.07, now2 + 0.1);
      wg.gain.exponentialRampToValueAtTime(0.001, now2 + 0.5);
      src.connect(filt); filt.connect(wg); wg.connect(sfxGain);
      src.start(now2); src.stop(now2 + 0.6);
    }
  }
  notingEvents.push(ev);
  notingTotal++;
}

function updateNotingMed(dt) {
  notingTimer += dt;
  notingSpawnTimer += dt;
  notingFeedbackTimer = Math.max(notingFeedbackTimer - dt, 0);
  notingWindAlpha = Math.max(notingWindAlpha - dt * 1.2, 0);

  // Spawn events — rate increases over time
  var spawnRate = 2.2 - Math.min(notingTimer / notingDuration, 0.7) * 1.0;
  if (notingSpawnTimer >= spawnRate) {
    notingSpawnTimer = 0;
    spawnNotingEvent();
  }

  // Track arrow key presses (just-pressed detection)
  var upNow = !!(keys['ArrowUp'] || keys['w'] || keys['W']);
  var rightNow = !!(keys['ArrowRight'] || keys['d'] || keys['D']);
  var leftNow = !!(keys['ArrowLeft'] || keys['a'] || keys['A']);
  var upJust = upNow && !prevArrowUp;
  var rightJust = rightNow && !prevArrowRight;
  var leftJust = leftNow && !prevArrowLeft;
  prevArrowUp = upNow;
  prevArrowRight = rightNow;
  prevArrowLeft = leftNow;

  // Determine which note the player is making
  var playerNote = null;
  if (upJust) playerNote = 'see';
  else if (rightJust) playerNote = 'hear';
  else if (leftJust) playerNote = 'feel';

  // Update events
  var anyNoted = false;
  for (var i = notingEvents.length - 1; i >= 0; i--) {
    var ev = notingEvents[i];
    if (ev.noted || ev.missed) continue;
    ev.timer += dt;

    // Check if player pressed correct key
    if (playerNote && playerNote === ev.type && !anyNoted) {
      ev.noted = true;
      anyNoted = true;
      notingScore++;
      focus = Math.min(focus + 6, 100);
      if (ev.type === 'see') {
        notingFeedback = '\u25B2 SEE \u2714';
        playSfx('chime');
      } else if (ev.type === 'hear') {
        notingFeedback = '\u25B6 HEAR \u2714';
        playSfx('chime');
      } else {
        notingFeedback = '\u25C0 FEEL \u2714';
        playSfx('chime');
      }
      notingFeedbackTimer = 0.8;
      // Spawn noting particles
      for (var pi = 0; pi < 5; pi++) spawnParticle(ev.x, ev.y, PAL.gold, 0.8);
    }

    // Missed — ran out of time
    if (ev.timer >= ev.maxTime && !ev.noted) {
      ev.missed = true;
      focus = Math.max(focus - 8, 0);
      playSfx('focus_loss');
      notingFeedback = 'Missed!';
      notingFeedbackTimer = 0.6;
    }
  }

  // Wrong note pressed (no matching event)
  if (playerNote && !anyNoted) {
    var hasActive = notingEvents.some(function(ev) { return !ev.noted && !ev.missed; });
    if (hasActive) {
      focus = Math.max(focus - 5, 0);
      notingFeedback = 'Wrong sense!';
      notingFeedbackTimer = 0.6;
      playSfx('focus_loss');
    }
  }

  // Clean up old events
  notingEvents = notingEvents.filter(function(ev) {
    return ev.timer < ev.maxTime + 0.5;
  });

  // Shadow appears midway
  if (notingTimer > 10 && !shadowActive) {
    shadowActive = true;
    shadowX = player.x + 100;
    shadowY = player.y;
  }
  updateShadow(dt);

  // Failure
  if (focus <= 0) {
    notingActive = false;
    shadowActive = false;
    notingEvents = [];
    triggerReincarnation('\ud83e\udd8e Gecko', 'Lost in shadows \u2014 clinging to the wall of self!', 'sloth');
    return;
  }

  // Complete
  if (notingTimer >= notingDuration) {
    notingActive = false;
    shadowActive = false;
    notingEvents = [];
    level3MedDone = true;
    gameState = 'playing';
    var accuracy = notingTotal > 0 ? Math.round(notingScore / notingTotal * 100) : 0;
    showDialogue([
      "The shadow fades.",
      "See. Hear. Feel. Just noting, nothing more.",
      "Accuracy: " + accuracy + "%",
      "Things arise and pass."
    ]);
    dialogueQueue.push('__START_RAIN__');
    playSfx('bell');
  }
}

// ======================================================================
// PARTICLES
// ======================================================================

function spawnParticle(x, y, color, life) {
  particles.push({
    x, y,
    vx: (Math.random()-0.5)*30,
    vy: -20 - Math.random()*20,
    life: life || 1,
    maxLife: life || 1,
    color,
  });
}

// ======================================================================
// REINCARNATION (humorous failure)
// ======================================================================

function triggerSuccumbing(dtype, reincarnName, reincarnDescription, deathCause) {
  gameState = 'succumbing';
  succumbType = dtype;
  succumbTimer = 0;
  succumbReincarnName = reincarnName;
  succumbReincarnDesc = reincarnDescription;
  lastDeathCause = deathCause || dtype;
  // Find the distraction entity for position reference
  succumbEntityRef = entities.find(e => e.dtype === dtype && e.active) || null;
  stopMusic();
  // Play a dramatic sound
  if (dtype === 'angulimala') playSfx('chop');
  else if (dtype === 'food') playSfx('pickup');
  else if (dtype === 'gold') playSfx('pickup');
  else playSfx('focus_loss');
}

function triggerReincarnation(animal, description, deathCause) {
  gameState = 'reincarnation';
  reincarnAs = animal;
  reincarnDesc = description;
  reincarnTimer = 0;
  lastDeathCause = deathCause || '';
  deathLevel = currentLevel;
  stopMusic();
  playSfx('bell');
}

// ======================================================================
// INPUT
// ======================================================================

let interactJustPressed = false;
let prevInteract = false;

function isInteract() {
  return keys[' '] || keys['e'] || keys['E'] || keys['Enter'];
}

// ======================================================================
// UPDATE
// ======================================================================

function update(dt) {
  gameTime += dt;

  const curInteract = isInteract();
  interactJustPressed = curInteract && !prevInteract;
  prevInteract = curInteract;

  if (gameState === 'title') {
    if (interactJustPressed) {
      initAudio();
      startIntro();
    }
    return;
  }

  if (gameState === 'intro') {
    updateIntro(dt);
    return;
  }

  if (gameState === 'transition') {
    updateTransition(dt);
    return;
  }

  if (gameState === 'cessation') {
    updateCessation(dt);
    return;
  }

  if (gameState === 'succumbing') {
    succumbTimer += dt;
    if (succumbTimer >= succumbDuration) {
      triggerReincarnation(succumbReincarnName, succumbReincarnDesc, lastDeathCause);
    }
    return;
  }

  if (gameState === 'reincarnation') {
    reincarnTimer += dt;
    // Auto-open level menu after 3 seconds
    if (reincarnTimer > 3 && !levelMenuActive) {
      levelMenuActive = true;
      menuSelectedLevel = deathLevel;
      reincarnTimer = 0;
      return;
    }
    // Or open immediately with SPACE press
    if (reincarnTimer > 1.5 && !levelMenuActive && interactJustPressed) {
      levelMenuActive = true;
      menuSelectedLevel = deathLevel;
      reincarnTimer = 0;
      return;
    }
    if (levelMenuActive) {
      // Navigate menu with arrow keys
      if ((keys['ArrowUp'] || keys['w'] || keys['W']) && !prevArrowUp) {
        menuSelectedLevel = Math.max(0, menuSelectedLevel - 1);
        playSfx('blip');
      }
      if ((keys['ArrowDown'] || keys['s'] || keys['S']) && !prevArrowDown) {
        menuSelectedLevel = Math.min(currentLevel, menuSelectedLevel + 1);
        playSfx('blip');
      }
      prevArrowUp = !!(keys['ArrowUp'] || keys['w'] || keys['W']);
      prevArrowDown = !!(keys['ArrowDown'] || keys['s'] || keys['S']);
      // Select with space
      if (interactJustPressed) {
        setupLevel(menuSelectedLevel);
        levelMenuActive = false;
        gameState = 'playing';
        stopMusic();
        playSfx('chime');
        return;
      }
      // Back to title with Q or ESC
      if (keys['q'] || keys['Q'] || keys['Escape']) {
        gameState = 'title';
        levelMenuActive = false;
        stopMusic();
        return;
      }
    }
    if (reincarnTimer > 4 && !levelMenuActive && interactJustPressed) {
      gameState = 'title';
      stopMusic();
    }
    return;
  }

  if (gameState === 'ending') {
    updateEnding(dt);
    return;
  }

  if (gameState === 'dialogue') {
    // Typewriter animation
    if (dialogueCharIndex < dialogueText.length) {
      dialogueCharTimer += dt;
      const charsToAdd = Math.floor(dialogueCharTimer / DIALOGUE_CHAR_SPEED);
      if (charsToAdd > 0) {
        dialogueCharIndex = Math.min(dialogueCharIndex + charsToAdd, dialogueText.length);
        dialogueCharTimer -= charsToAdd * DIALOGUE_CHAR_SPEED;
      }
      dialogueTalkAnim += dt;
    }
    if (interactJustPressed) advanceDialogue();
    return;
  }

  if (gameState === 'meditation') {
    updateMeditation(dt);
    return;
  }

  if (gameState === 'noting') {
    updateNotingMed(dt);
    return;
  }

  if (gameState === 'insight_med') {
    updateInsightMed(dt);
    return;
  }

  if (gameState === 'breathing') {
    updateBreathingMed(dt);
    return;
  }

  if (gameState === 'eating') {
    updateEatingGame(dt);
    return;
  }

  if (gameState !== 'playing') return;

  // Player movement (frozen during prostration)
  let dx = 0, dy = 0;
  if (!prostrationActive) {
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;

    // Tap-to-move navigation (if no keyboard input)
    if (dx === 0 && dy === 0 && tapTarget) {
      const playerFeetY = player.y + 12; // Offset to player's feet
      const distX = tapTarget.x - player.x;
      const distY = tapTarget.y - playerFeetY;
      const dist = Math.sqrt(distX * distX + distY * distY);

      // Snap to target when close enough (within 24px - one tile)
      if (dist < 24) {
        player.x = tapTarget.x;
        player.y = tapTarget.y;
        tapTarget = null;
      } else {
        // Calculate direction towards target
        dx = distX / dist;
        dy = distY / dist;
      }
    }
  }

  if (dx !== 0 || dy !== 0) {
    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    const speed = player.speed * 60 * dt;
    const nx = player.x + dx * speed;
    const ny = player.y + dy * speed;

    if (canMove(nx, player.y)) player.x = nx;
    if (canMove(player.x, ny)) player.y = ny;

    if (Math.abs(dx) > Math.abs(dy)) player.dir = dx > 0 ? 'right' : 'left';
    else player.dir = dy > 0 ? 'down' : 'up';

    player.animTimer += dt;
    if (player.animTimer > 0.2) {
      player.animTimer = 0;
      player.frame = 1 - player.frame;
      if (Math.random() < 0.3) playSfx('step');
    }
  } else {
    player.animTimer = 0;
    player.frame = 0;
  }

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 40 * dt;
    p.life -= dt;
    return p.life > 0;
  });

  // Update hindrance entities (wander + freeze-frame teaching)
  if (currentLevel <= 2 && !hindranceFreezeActive) {
    for (var hi = 0; hi < entities.length; hi++) {
      var he = entities[hi];
      if (he.type !== 'hindrance' || !he.active) continue;
      he.pulseTimer += dt;
      he.wanderTimer -= dt;
      if (he.wanderTimer <= 0) {
        he.wanderTimer = 2 + Math.random() * 3;
        he.wanderDx = (Math.random() - 0.5) * 24;
        he.wanderDy = (Math.random() - 0.5) * 24;
      }
      he.x += he.wanderDx * dt;
      he.y += he.wanderDy * dt;
      he.x = Math.max(TILE, Math.min((14) * TILE, he.x));
      he.y = Math.max(TILE, Math.min((9) * TILE, he.y));
      // Check contact with player
      var hdist = Math.sqrt((he.x - player.x) ** 2 + (he.y - player.y) ** 2);
      if (hdist < 36) {
        // Drain focus on contact
        focus = Math.max(focus - 3 * dt, 0);
        craving += 1 * dt;
        // First-time teaching freeze
        if (!hindranceShownSet.has(he.hindranceType)) {
          hindranceShownSet.add(he.hindranceType);
          hindranceFreezeActive = true;
          hindranceFreezeText = he.teaching;
          hindranceFreezeTimer = 0;
          playSfx('focus_loss');
        }
      }
    }
  }
  // Hindrance freeze-frame overlay
  if (hindranceFreezeActive) {
    hindranceFreezeTimer += dt;
    if (hindranceFreezeTimer > 1 && interactJustPressed) {
      hindranceFreezeActive = false;
    }
    return; // freeze all game logic during teaching
  }

  if (currentLevel === 0) updateLevel1(dt);
  else if (currentLevel === 1) updateLevel2(dt);
  else if (currentLevel === 2) {
    if (rainySeasonActive) updateRainySeason(dt);
    else updateLevel3(dt);
  }
  else if (currentLevel === 3) updateAccessConcentration(dt);
  else if (currentLevel === 4) updateKasinaTraining(dt);
  else if (currentLevel === 5) updateJhana1(dt);
  else if (currentLevel === 6) updateJhana2(dt);
  else if (currentLevel === 7) updateJhana3(dt);
  else if (currentLevel === 8) updateJhana4(dt);
  else if (currentLevel >= 9 && currentLevel <= 12) updateArupa(dt);

  // Global craving failure — enlightened monks are free from craving
  if (craving >= 100 && gameState === 'playing' && !enlightened) {
    triggerReincarnation('\ud83d\udc7b Hungry Ghost', 'Consumed by endless craving!', 'craving');
    return;
  }

  // Craving decay (or instant clear if enlightened)
  if (enlightened) { craving = 0; }
  else {
    cravingDecayTimer += dt;
    if (cravingDecayTimer > 2) { craving = Math.max(craving - 0.5 * dt, 0); }
  }
}

// ======================================================================
// LEVEL 1 UPDATE
// ======================================================================

function updateLevel1(dt) {
  // Update prostration animation
  if (prostrationActive) {
    prostrationTimer += dt;
    if (prostrationPhase === -1) {
      // Step back from shrine before bowing
      const targetY = 4 * TILE;
      player.dir = 'down';
      if (player.y < targetY) {
        player.y += 80 * dt;
        if (player.y >= targetY) player.y = targetY;
      } else {
        prostrationPhase = 0;
        prostrationTimer = 0;
        player.dir = 'up';
      }
    } else if (prostrationPhase === 0 && prostrationTimer > 0.3) {
      prostrationPhase = 1; prostrationTimer = 0; // bending
    } else if (prostrationPhase === 1 && prostrationTimer > 0.5) {
      prostrationPhase = 2; prostrationTimer = 0; // down (forehead touches ground)
      playSfx('step');
    } else if (prostrationPhase === 2 && prostrationTimer > 0.8) {
      prostrationPhase = 3; prostrationTimer = 0; // rising
    } else if (prostrationPhase === 3 && prostrationTimer > 0.5) {
      prostrationCount++;
      if (prostrationCount >= 3) {
        prostrationActive = false;
        showDialogue(["*Three prostrations complete.", "...The Buddha smiles in the clean light."]);
      } else {
        prostrationPhase = 0; prostrationTimer = 0; // next bow
      }
    }
    return;
  }

  if (!interactJustPressed) return;

  // Wood chopping
  const wood = nearestEntity('wood', 40);
  if (wood && !wood.chopped) {
    wood.chopped = true;
    wood.chopAnim = 1.0;
    woodChopped++;
    playSfx('chop');
    for (let i = 0; i < 8; i++) spawnParticle(wood.x+16, wood.y+16, PAL.brown, 0.6);
    for (let i = 0; i < 4; i++) spawnParticle(wood.x+16, wood.y+12, PAL.wood, 0.4);
    if (woodChopped >= woodTotal) showDialogue(["*The last log splits cleanly. The wood is chopped."]);
    else showDialogue(["*CHOP* ... " + woodChopped + "/" + woodTotal]);
    return;
  }

  // Well (col 13, row 3)
  if (!hasWater && !waterDelivered && Math.abs(player.x - 13*TILE) < 48 && Math.abs(player.y - 3*TILE) < 48) {
    hasWater = true;
    playSfx('pickup');
    showDialogue(["I fill the bucket with water. It is heavier than I expected."]);
    return;
  }

  // Shrine (col 7, row 2)
  if (hasWater && !waterDelivered && Math.abs(player.x - 7*TILE) < 48 && Math.abs(player.y - 2*TILE) < 48) {
    waterDelivered = true;
    hasWater = false;
    playSfx('pickup');
    showDialogue(["*The dust falls away under gentle hands.", "...The golden face shines again.", "I bow three times, facing north."]);
    // Start prostration animation (step back first)
    prostrationActive = true;
    prostrationCount = 0;
    prostrationTimer = 0;
    prostrationPhase = -1;
    player.dir = 'down'; // face away to step back
    return;
  }

  // Elder
  const elder = nearestEntity('npc_elder', 48);
  if (elder) {
    const choresComplete = (waterDelivered && woodChopped >= woodTotal);
    if (!elder.talked) {
      elder.talked = true;
      talkedToElder = true;
      showDialogue(elder.dialogue);
      if (enlightened) {
        dialogueQueue.push('__GAME_END__');
      }
    } else if (choresComplete) {
      showDialogue(elder.dialogueAfter);
      dialogueQueue.push('__GAME_END__');
    } else {
      showDialogue(["Finish your chores first."]);
    }
    return;
  }

  // Cushion (col 6, row 5)
  if (Math.abs(player.x - 6*TILE) < 40 && Math.abs(player.y - 5*TILE) < 40) {
    const choresComplete = (waterDelivered && talkedToElder && woodChopped >= woodTotal);
    if (choresComplete && !level1MedDone) {
      level1ChoresDone = true;
      player.dir = 'up'; // Face the Buddha respectfully
      showDialogue(["I sit on the cushion, facing the Buddha.", "...Close the eyes. Follow the breath."]);
      dialogueQueue.push('__START_MED_1__');
    } else if (!choresComplete) {
      showDialogue(["...Not yet. I should complete my chores first."]);
    } else if (level1MedDone) {
      showDialogue(["*The mind is settled. Time to move on."]);
    }
  }
}

// ======================================================================
// LEVEL 2 UPDATE
// ======================================================================

function updateLevel2(dt) {
  nearDistraction = false;
  let closestDistractionDist = 999;
  closestDistractionType = '';
  for (const e of entities) {
    if (e.type !== 'distraction' || !e.active) continue;
    const dd = dist(player, e);
    const rad = e.radius || 64;
    if (dd < rad) {
      nearDistraction = true;
      if (dd < closestDistractionDist) { closestDistractionDist = dd; closestDistractionType = e.dtype; }
    }
  }

  if (nearDistraction) {
    distractionStareTimer += dt;
    // Closer = stronger pull
    const proximity = 1 - (closestDistractionDist / 80);
    if (distractionStareTimer > 0.3) {
      distractionMeter = Math.min(distractionMeter + 25 * proximity * dt, 100);
      composure = Math.max(composure - 15 * proximity * dt, 0);
    }
  } else {
    distractionStareTimer = Math.max(distractionStareTimer - dt, 0);
    composure = Math.min(composure + 3 * dt, 100);
  }

  // Update temptation sparkles
  temptFlashTimer = Math.max(temptFlashTimer - dt, 0);
  temptScreenShake = Math.max(temptScreenShake - dt * 4, 0);
  temptSparkles = temptSparkles.filter(function(s) {
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += 30 * dt;
    s.life -= dt;
    return s.life > 0;
  });

  if (interactJustPressed) {
    // Check for distraction interaction first — tempting rewards!
    const nearDist = nearestEntity('distraction', 52);
    if (nearDist) {
      triggerTemptation(nearDist);
      return;
    }

    const v = nearestEntity('villager', 48);
    if (v && !v.givenAlms) {
      v.givenAlms = true;
      almsCollected++;
      blessingsPending++;
      playSfx('pickup');
      const lines = v.dialogue.slice();
      // Monk offers meditation advice for their struggle
      if (v.id === 'v1') {
        lines.push('"Before sleep, sit quietly for ten breaths."');
        lines.push('"Name each worry, then release it with the exhale."');
        lines.push('"The mind tires of spinning when you stop feeding it."');
      } else if (v.id === 'v2') {
        lines.push('"When anger rises, pause. Feel the heat in your body."');
        lines.push('"Do not act until three full breaths have passed."');
        lines.push('"Anger is a fire. Stillness starves it of fuel."');
      } else {
        lines.push('"Each morning, sit and notice one thing you can feel."');
        lines.push('"Joy is not found. It is uncovered, beneath the noise."');
        lines.push('"Begin small — the warmth of the sun, the taste of rice."');
      }
      if (almsCollected >= almsTotal) lines.push("All alms collected. Return to the top.");
      showDialogue(lines);
      // Blessing particles around villager
      for (let bi = 0; bi < 10; bi++) spawnParticle(v.x + 16, v.y + 8, PAL.gold, 1.2);
      return;
    }

    // Return point — top of map
    if (almsCollected >= almsTotal && !almsReturned && player.y < TILE * 1.5) {
      almsReturned = true;
      showDialogue(["I return to the monastery.", "...Time to sit and eat mindfully."]);
      dialogueQueue.push('__START_EATING__');
    }
  }

  // Composure failure — play succumbing animation, then reincarnate
  if (composure <= 0) {
    if (closestDistractionType === 'angulimala') {
      triggerSuccumbing('angulimala', '\ud83d\udc80 Angulimala\'s Disciple', 'Rage consumed you! You wear a necklace of severed fingers!', 'anger');
    } else if (closestDistractionType === 'lady') {
      triggerSuccumbing('lady', '\ud83d\udc0d Lustful Serpent', 'Seduced by beauty! Trapped in the coils of desire!', 'craving');
    } else if (closestDistractionType === 'gold') {
      triggerSuccumbing('gold', '\ud83d\udc00 Treasure Rat', 'Greed consumed you! Forever hoarding, never satisfied!', 'craving');
    } else if (closestDistractionType === 'food') {
      triggerSuccumbing('food', '\ud83d\udc37 Hungry Ghost', 'Gluttony overwhelmed you! An enormous belly, a tiny mouth!', 'craving');
    } else {
      triggerReincarnation('\ud83d\udc15 Barking Dog', 'Too distracted by the sights and sounds!', 'restlessness');
    }
    return;
  }

  if (almsReturned && eatingDone && gameState === 'playing') {
    startTransition("Level 3: Forest Path\n\"Insight\"", () => setupLevel(2));
  }
}

// ======================================================================
// TEMPTATION EFFECTS (Level 2 — interacting with distractions)
// ======================================================================

function triggerTemptation(e) {
  const ex = e.x + 16, ey = e.y + 16;

  // Each distraction type has a unique, visually rewarding effect
  if (e.dtype === 'gold') {
    // Gold shower — coins explode outward in an arc
    playSfx('tempt_gold');
    temptFlashColor = 'rgba(232,200,64,';
    temptFlashText = 'GOLD! SO MUCH GOLD!';
    for (let i = 0; i < 25; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 60 + Math.random() * 120;
      temptSparkles.push({
        x: ex, y: ey,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 60,
        life: 1.2 + Math.random() * 0.8,
        maxLife: 2.0,
        color: Math.random() > 0.3 ? PAL.gold : '#fff8c0',
        size: 3 + Math.random() * 3
      });
    }
    temptScreenShake = 0.4;

  } else if (e.dtype === 'lady') {
    // Hearts and flower petals spiral outward
    playSfx('tempt_lady');
    temptFlashColor = 'rgba(224,96,128,';
    temptFlashText = 'Such beauty...';
    for (let i = 0; i < 20; i++) {
      const ang = (i / 20) * Math.PI * 2;
      const spd = 30 + Math.random() * 60;
      temptSparkles.push({
        x: ex, y: ey,
        vx: Math.cos(ang) * spd + (Math.random() - 0.5) * 20,
        vy: Math.sin(ang) * spd - 40,
        life: 1.5 + Math.random() * 1.0,
        maxLife: 2.5,
        color: ['#ff6090', '#ff80a0', '#e06080', '#ffb0c0'][i % 4],
        size: 4 + Math.random() * 2
      });
    }

  } else if (e.dtype === 'food') {
    // Steam explosion — aromatic wisps rise with food particles
    playSfx('tempt_food');
    temptFlashColor = 'rgba(220,140,60,';
    temptFlashText = 'The aroma is irresistible!';
    for (let i = 0; i < 18; i++) {
      temptSparkles.push({
        x: ex + (Math.random() - 0.5) * 30,
        y: ey,
        vx: (Math.random() - 0.5) * 40,
        vy: -40 - Math.random() * 80,
        life: 1.5 + Math.random() * 1.0,
        maxLife: 2.5,
        color: ['#ffe0c0', '#ffffff', '#c87040', '#e8c840', '#cc3030'][i % 5],
        size: 3 + Math.random() * 4
      });
    }

  } else if (e.dtype === 'angulimala') {
    // Red power explosion — rage lightning
    playSfx('tempt_anger');
    temptFlashColor = 'rgba(200,40,40,';
    temptFlashText = 'POWER surges through you!';
    for (let i = 0; i < 22; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 80 + Math.random() * 100;
      temptSparkles.push({
        x: ex, y: ey,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 0.6 + Math.random() * 0.6,
        maxLife: 1.2,
        color: Math.random() > 0.5 ? '#ff3030' : '#ffcc00',
        size: 2 + Math.random() * 3
      });
    }
    temptScreenShake = 0.6;
  }

  temptFlashTimer = 2.0;

  // The cost: composure drops, craving surges
  composure = Math.max(composure - 20, 0);
  craving = Math.min(craving + 15, 100);
  distractionMeter = Math.min(distractionMeter + 25, 100);
}

// ======================================================================
// LEVEL 3 UPDATE
// ======================================================================

function updateLevel3(dt) {
  for (const e of entities) {
    if (e.type !== 'insight') continue;
    e.visible = Math.sin(gameTime * 2 + e.x * 0.1) > -0.3;
  }

  if (interactJustPressed) {
    const ins = nearestEntity('insight', 48);
    if (ins && ins.active && ins.visible !== false) {
      ins.active = false;
      insightsGathered++;
      playSfx('chime');
      const lines = [ins.label + ".", ins.text];
      if (insightsGathered >= insightsTotal) lines.push("All objects observed. Sit on the cushion.");
      showDialogue(lines);
      return;
    }

    // Cushion (col 6, row 5)
    if (Math.abs(player.x - 6*TILE) < 40 && Math.abs(player.y - 5*TILE) < 40) {
      if (insightsGathered >= insightsTotal && !level3MedDone) {
        showDialogue(["You sit among the fading forms.", "Close your eyes and reflect on what you have seen."]);
        dialogueQueue.push('__START_INSIGHT_MED__');
      } else if (insightsGathered < insightsTotal) {
        showDialogue(["Observe the forest objects first."]);
      }
    }
  }

  updateShadow(dt);
}

// ======================================================================
// RAINY SEASON (after Forest, before Access Concentration)
// ======================================================================

function setupRainySeason() {
  rainySeasonActive = true;
  map = parseMap(MAP_RAIN);
  player.x = 7 * TILE;
  player.y = 9 * TILE;
  player.dir = 'up';
  entities = [];
  particles = [];
  thoughtParticles = [];
  mudTrails = [];
  rainyMedDone = false;
  rainyNPCsTalked = 0;
  shadowActive = false;
  spriteCache = {};

  // Candle in front of the meditation cushion (col 6, row 2)
  entities.push({type:'rain_candle', x:6*TILE, y:2*TILE + 18, id:'rc_candle', active:true});

  // Angry villagers along the path
  entities.push({type:'angry_villager', x:10*TILE, y:7*TILE, id:'rv1', active:true, talked:false,
    dialogue:["Look at this mud!", "You are tracking filth everywhere, monk!"]});
  entities.push({type:'angry_villager', x:4*TILE, y:5*TILE, id:'rv2', active:true, talked:false,
    dialogue:["My clean path! Ruined!", "Go back where you came from!"]});
  entities.push({type:'angry_villager', x:11*TILE, y:4*TILE, id:'rv3', active:true, talked:false,
    dialogue:["Disgusting! Mud on my doorstep!", "Monks should know better!"]});

  playRain();
}

function updateRainySeason(dt) {
  // Leave mud footprint trail
  var lastMud = mudTrails.length > 0 ? mudTrails[mudTrails.length - 1] : null;
  if (!lastMud || Math.abs(player.x - lastMud.x) > 14 || Math.abs(player.y - lastMud.y) > 14) {
    mudTrails.push({x: player.x, y: player.y, alpha: 0.7});
    if (mudTrails.length > 40) mudTrails.shift();
  }
  mudTrails.forEach(function(m) { m.alpha = Math.max(m.alpha - dt * 0.02, 0); });
  mudTrails = mudTrails.filter(function(m) { return m.alpha > 0; });

  if (!interactJustPressed) return;

  // Talk to angry villagers
  var npc = nearestEntity('angry_villager', 48);
  if (npc && !npc.talked) {
    npc.talked = true;
    rainyNPCsTalked++;
    var response;
    if (rainyNPCsTalked === 1) {
      response = [
        "I am sorry. Please forgive me.",
        "I will be more careful."
      ];
    } else if (rainyNPCsTalked === 2) {
      response = [
        "I... yes. Forgive me.",
        "...Why do they provoke so easily?",
        "No. Patience. Stay calm."
      ];
    } else {
      response = [
        "I am TRYING to be careful!",
        "...No. Breathe.",
        "...The anger is burning. I must endure this too."
      ];
    }
    showDialogue(npc.dialogue.concat(response));
    return;
  }

  // Cushion at monastery (col 6, row 2)
  if (Math.abs(player.x - 6*TILE) < 40 && Math.abs(player.y - 2*TILE) < 40) {
    if (!rainyMedDone) {
      rainyMedDone = true;
      showDialogue([
        "You sit in the dark meditation hall.",
        "Rain drums on the roof all night.",
        "The mind settles. The breath becomes fine.",
        "Access concentration arises naturally."
      ]);
      dialogueQueue.push('__COMPLETE_RAIN__');
      playSfx('bell');
    } else {
      showDialogue(["The rain has eased. Dawn approaches."]);
    }
  }
}

function renderRain() {
  // Dark stormy overlay
  ctx.fillStyle = 'rgba(20,25,40,0.25)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Mud footprints
  for (var mi = 0; mi < mudTrails.length; mi++) {
    var m = mudTrails[mi];
    ctx.globalAlpha = m.alpha * 0.6;
    ctx.fillStyle = '#5a4530';
    ctx.fillRect(m.x + 10, m.y + 26, 4, 3);
    ctx.fillRect(m.x + 19, m.y + 27, 4, 3);
  }
  ctx.globalAlpha = 1;

  // Rain drops
  ctx.strokeStyle = 'rgba(140,160,200,0.35)';
  ctx.lineWidth = 1;
  var t = gameTime;
  for (var i = 0; i < 50; i++) {
    var rx = (i * 12.7 + Math.sin(i * 3.1) * 30) % WIDTH;
    var ry = ((t * 280 + i * 31.7) % (HEIGHT + 16)) - 8;
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(rx - 0.5, ry + 7);
    ctx.stroke();
  }

  // Splash effects on ground
  for (var si = 0; si < 12; si++) {
    var sx = ((si * 41 + t * 50) % WIDTH);
    if (((t * 3 + si * 0.9) % 1) < 0.2) {
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = 'rgba(140,160,200,0.3)';
      ctx.beginPath();
      ctx.arc(sx, HEIGHT - 14 + (si % 4) * 6, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ======================================================================
// LEVEL 4 — ACCESS CONCENTRATION
// ======================================================================

function updateAccessConcentration(dt) {
  accTimer += dt;
  if (Math.abs(accOrbX - accOrbTX) < 2 && Math.abs(accOrbY - accOrbTY) < 2) {
    accOrbTX = 60 + Math.random() * (WIDTH - 120);
    accOrbTY = 60 + Math.random() * (HEIGHT - 120);
  }
  accOrbX += (accOrbTX - accOrbX) * 0.3 * dt;
  accOrbY += (accOrbTY - accOrbY) * 0.3 * dt;
  accOrbX += Math.sin(gameTime * 1.5) * 0.3;
  accOrbY += Math.cos(gameTime * 1.2) * 0.3;

  var rSpeed = 120 * dt;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) accReticleX -= rSpeed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) accReticleX += rSpeed;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) accReticleY -= rSpeed;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) accReticleY += rSpeed;
  accReticleX = Math.max(16, Math.min(WIDTH - 16, accReticleX));
  accReticleY = Math.max(16, Math.min(HEIGHT - 16, accReticleY));

  var rd = Math.sqrt((accReticleX - accOrbX) ** 2 + (accReticleY - accOrbY) ** 2);
  if (rd < 20) { accStability += 12 * dt; focus = Math.min(focus + 3 * dt, 100); }
  else if (rd < 50) { accStability += 3 * dt; }
  else { accStability -= 8 * dt; focus = Math.max(focus - 2 * dt, 0); }
  accStability = Math.max(0, Math.min(100, accStability));

  if (accTimer > 2 && Math.random() < 0.02 + accTimer * 0.001) {
    var types = ['thought', 'emotion', 'memory', 'sound'];
    var t = types[Math.floor(Math.random() * types.length)];
    var ang = Math.random() * Math.PI * 2;
    var spd = 30 + Math.random() * 40;
    accDisturbs.push({
      x: WIDTH / 2 + Math.cos(ang) * 260, y: HEIGHT / 2 + Math.sin(ang) * 200,
      vx: -Math.cos(ang) * spd, vy: -Math.sin(ang) * spd, type: t,
      life: 4 + Math.random() * 3,
      label: t === 'thought' ? 'Wandering...' : t === 'emotion' ? 'Worry' : t === 'memory' ? 'Remember...' : '\u266b',
    });
  }
  accDisturbs = accDisturbs.filter(function(d) {
    d.x += d.vx * dt; d.y += d.vy * dt; d.life -= dt;
    var dd = Math.sqrt((d.x - accReticleX) ** 2 + (d.y - accReticleY) ** 2);
    if (dd < 30) { accStability -= 15; focus -= 5; playSfx('focus_loss'); d.life = 0; }
    return d.life > 0;
  });
  if (interactJustPressed) { craving += 2; }
  if (accStability >= 95 && !accComplete) {
    accComplete = true; playSfx('bell');
    showDialogue(['Access Concentration achieved.', 'The mind is steady. The gate appears.', 'Now you must learn to see the inner light.']);
    dialogueQueue.push('__COMPLETE_ACC__');
  }
}

// ======================================================================
// LEVEL 5 — KASINA TRAINING + SCATTER MIND BOSS
// ======================================================================

function updateKasinaTraining(dt) {
  jhTimer += dt;
  if (interactJustPressed) { kasEyesOpen = !kasEyesOpen; playSfx('blip'); craving += 0.5; }

  if (kasPhase === 0) {
    if (kasEyesOpen) kasFocusTimer += dt; else kasFocusTimer += dt * 0.3;
    if (kasFocusTimer >= 8) { kasPhase = 1; kasFocusTimer = 0; playSfx('chime'); }
  } else if (kasPhase === 1) {
    if (!kasEyesOpen) {
      kasFocusTimer += dt;
      kasAfterX += (kasNimittaX - kasAfterX) * 0.5 * dt;
      kasAfterY += (kasNimittaY - kasAfterY) * 0.5 * dt;
    } else { kasFocusTimer = Math.max(kasFocusTimer - dt * 0.3, 0); }
    if (kasFocusTimer >= 10) { kasPhase = 2; kasFocusTimer = 0; playSfx('chime'); }
  } else if (kasPhase === 2) {
    kasBossActive = true;
    kasRotation += dt * 0.3;
    if (kasFakes.length < 4 && Math.random() < 0.01) {
      kasFakes.push({ x: 60 + Math.random() * (WIDTH - 120), y: 60 + Math.random() * (HEIGHT - 120), life: 3 + Math.random() * 4 });
    }
    kasFakes = kasFakes.filter(function(f) { f.life -= dt; return f.life > 0; });

    var rSpeed = 100 * dt;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) accReticleX -= rSpeed;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) accReticleX += rSpeed;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) accReticleY -= rSpeed;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) accReticleY += rSpeed;
    accReticleX = Math.max(16, Math.min(WIDTH - 16, accReticleX));
    accReticleY = Math.max(16, Math.min(HEIGHT - 16, accReticleY));

    var rd = Math.sqrt((accReticleX - kasNimittaX) ** 2 + (accReticleY - kasNimittaY) ** 2);
    if (rd < 25) kasBossHP -= 10 * dt; else kasBossHP = Math.min(kasBossHP + 3 * dt, 100);
    for (var fi = 0; fi < kasFakes.length; fi++) {
      var fd = Math.sqrt((accReticleX - kasFakes[fi].x) ** 2 + (accReticleY - kasFakes[fi].y) ** 2);
      if (fd < 25) { focus -= 5 * dt; kasBossHP += 5 * dt; }
    }
    if (kasBossHP <= 0 && !kasComplete) {
      kasComplete = true; playSfx('bell');
      showDialogue(['The Scatter Mind dissolves.', 'The fire nimitta shines, pure and steady.', 'The gate to the Jhanas opens.']);
      dialogueQueue.push('__COMPLETE_KAS__');
    }
    // Failure: too many fakes focused on
    if (focus <= 0 && !kasComplete) {
      triggerReincarnation('\ud83e\uddeb Moth', 'Drawn to every false light!', 'doubt');
      return;
    }
  }
}

// ======================================================================
// 1ST JHANA — FIVE HINDRANCES
// ======================================================================

var HINDRANCE_NAMES = ['Sensual Desire', 'Ill Will', 'Sloth & Torpor', 'Restlessness', 'Doubt'];

function updateJhana1(dt) {
  jhTimer += dt;
  jh1SlowTimer = Math.max(jh1SlowTimer - dt, 0);
  jh1HindranceIdx = Math.floor(jhTimer / 6) % 5;

  var rMult = jh1SlowTimer > 0 ? 0.3 : 1;
  var rSpeed = 100 * dt * rMult;
  var rmx = 0, rmy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) rmx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) rmx += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) rmy -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) rmy += 1;
  if (jh1Reversed) { rmx = -rmx; rmy = -rmy; }
  accReticleX = Math.max(16, Math.min(WIDTH - 16, accReticleX + rmx * rSpeed));
  accReticleY = Math.max(16, Math.min(HEIGHT - 16, accReticleY + rmy * rSpeed));

  if (Math.random() < 0.02 + jhTimer * 0.0005) {
    var ang = Math.random() * Math.PI * 2;
    jh1Attacks.push({
      x: WIDTH / 2 + Math.cos(ang) * 260, y: HEIGHT / 2 + Math.sin(ang) * 200,
      vx: -Math.cos(ang) * (28 + Math.random() * 20), vy: -Math.sin(ang) * (28 + Math.random() * 20),
      type: jh1HindranceIdx, life: 5,
    });
  }
  jh1Reversed = jh1HindranceIdx === 4;
  if (jh1HindranceIdx === 3) { jh1ShakeX = (Math.random() - 0.5) * 6; jh1ShakeY = (Math.random() - 0.5) * 6; }
  else { jh1ShakeX *= 0.9; jh1ShakeY *= 0.9; }

  jh1Attacks = jh1Attacks.filter(function(a) {
    a.x += a.vx * dt; a.y += a.vy * dt; a.life -= dt;
    var dd = Math.sqrt((a.x - accReticleX) ** 2 + (a.y - accReticleY) ** 2);
    if (dd < 24) { focus -= 5; craving += 2; if (a.type === 2) jh1SlowTimer = 1.5; playSfx('focus_loss'); a.life = 0; }
    return a.life > 0;
  });

  // SPACE recenters toward nimitta
  if (interactJustPressed) {
    accReticleX += (jhNimittaX - accReticleX) * 0.4;
    accReticleY += (jhNimittaY - accReticleY) * 0.4;
  }

  var rd = Math.sqrt((accReticleX - jhNimittaX) ** 2 + (accReticleY - jhNimittaY) ** 2);
  if (rd < 25) { jhFocusOnNimitta += dt; focus = Math.min(focus + 2 * dt, 100); }
  else { jhFocusOnNimitta = Math.max(jhFocusOnNimitta - dt * 0.5, 0); }

  if (jhFocusOnNimitta >= 15 && !jhComplete) {
    jhComplete = true; playSfx('bell');
    showDialogue(['The hindrances scatter.', 'Golden joy fills the space.', 'Directed attention dissolves into effortlessness.']);
    dialogueQueue.push('__COMPLETE_JH1__');
  }
  // Failure: overwhelmed by hindrances
  if (focus <= 0 && !jhComplete) {
    triggerReincarnation('\ud83d\udc12 Monkey', 'Mind swinging from branch to branch!', 'restlessness');
    return;
  }
}

// ======================================================================
// 2ND JHANA — INNER NARRATOR
// ======================================================================

function updateJhana2(dt) {
  jhTimer += dt;
  var anyKey = false;
  for (var k in keys) { if (keys[k]) anyKey = true; }
  if (anyKey) {
    jh2InputCount += dt;
    jh2NarratorStrength = Math.min(jh2NarratorStrength + 15 * dt, 100);
    jh2QuietTimer = 0;
    craving += 2 * dt;
  } else {
    jh2QuietTimer += dt;
    if (jh2QuietTimer > 1.5) jh2NarratorStrength = Math.max(jh2NarratorStrength - 5 * dt, 0);
  }
  if (Math.random() < jh2NarratorStrength * 0.0008) {
    var texts = ['Am I doing this right?', 'This is going well!', 'What comes next?',
      'I should try harder...', 'Almost there...', 'Focus focus focus',
      'Is this working?', 'I feel something!', 'Keep going!', 'How much longer?'];
    jh2Bubbles.push({
      x: 20 + Math.random() * (WIDTH - 40), y: HEIGHT + 10,
      text: texts[Math.floor(Math.random() * texts.length)],
      life: 4 + Math.random() * 3, vy: -20 - Math.random() * 15,
    });
  }
  jh2Bubbles = jh2Bubbles.filter(function(b) { b.y += b.vy * dt; b.life -= dt; return b.life > 0 && b.y > -30; });

  if (jh2NarratorStrength <= 2 && jh2QuietTimer > 12 && !jhComplete) {
    jhComplete = true; playSfx('bell');
    showDialogue(['The narrator falls silent.', 'Effort itself dissolves.', 'The mind flows without commentary.']);
    dialogueQueue.push('__COMPLETE_JH2__');
  }
  // Failure: narrator took over
  if (jh2NarratorStrength >= 100 && jh2InputCount > 12 && !jhComplete) {
    triggerReincarnation('\ud83e\udd9c Parrot', 'Could not stop the mental chatter!', 'restlessness');
    return;
  }
}

// ======================================================================
// 3RD JHANA — WARM CURRENTS (Bliss Becomes Quiet)
// ======================================================================

function updateJhana3(dt) {
  jhTimer += dt;
  if (jhComplete) return;

  // Player movement
  var rSpeed = 60 * dt;
  var moved = false;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { accReticleX -= rSpeed; moved = true; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { accReticleX += rSpeed; moved = true; }
  if (keys['ArrowUp'] || keys['w'] || keys['W']) { accReticleY -= rSpeed; moved = true; }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) { accReticleY += rSpeed; moved = true; }
  accReticleX = Math.max(16, Math.min(WIDTH - 16, accReticleX));
  accReticleY = Math.max(16, Math.min(HEIGHT - 16, accReticleY));

  // Movement amplifies the waves; stillness lets them fade
  if (moved) {
    jh3MovedRecently = Math.min(jh3MovedRecently + dt * 3, 1);
    jh3CalmTimer = Math.max(jh3CalmTimer - dt * 2, 0);
  } else {
    jh3MovedRecently = Math.max(jh3MovedRecently - dt * 0.5, 0);
    jh3CalmTimer += dt;
  }

  // Wave intensity: movement pumps it up, stillness drains it
  var targetIntensity = 0.15 + jh3MovedRecently * 0.85;
  jh3WaveIntensity += (targetIntensity - jh3WaveIntensity) * dt * 1.2;
  jh3WaveIntensity = Math.max(0, Math.min(1, jh3WaveIntensity));

  // Waves drift from left to right; gentle carry on the player
  jh3PlayerDrift = jh3WaveIntensity * 12 * dt;
  if (!moved) {
    accReticleX += jh3PlayerDrift;
    accReticleX = Math.max(16, Math.min(WIDTH - 16, accReticleX));
  }

  // Spawn new waves continuously
  if (Math.random() < 0.4 * dt * (1 + jh3WaveIntensity * 2)) {
    jh3Waves.push({
      x: -60,
      y: Math.random() * HEIGHT,
      speed: 16 + Math.random() * 14 + jh3WaveIntensity * 20,
      width: 50 + Math.random() * 50 + jh3WaveIntensity * 30,
      alpha: 0.15 + jh3WaveIntensity * 0.35
    });
  }

  // Update waves
  for (var wi = jh3Waves.length - 1; wi >= 0; wi--) {
    var w = jh3Waves[wi];
    w.x += w.speed * dt;
    // Waves sway vertically
    w.y += Math.sin(gameTime * 0.6 + wi * 0.7) * 4 * dt;
    if (w.x > WIDTH + 80) { jh3Waves.splice(wi, 1); }
  }

  // Warm bell harmonics drifting left to right
  jh3BellTimer += dt;
  if (jh3BellTimer > 3.5 + Math.random() * 3 && jh3WaveIntensity > 0.2) {
    jh3BellTimer = 0;
    playWarmBellHarmonic();
  }

  // Craving rises if player chases the waves (moves a lot)
  if (moved && jh3WaveIntensity > 0.5) {
    craving += dt * 1.5;
  }

  // Completion: sustained calm fades the waves away
  if (jh3CalmTimer > 16 && jh3WaveIntensity < 0.2) {
    jhComplete = true;
    playSfx('bell');
    showDialogue(['Joy softens.', 'Peace remains.']);
    dialogueQueue.push('__COMPLETE_JH3__');
  }

  // Failure: too much craving from chasing bliss
  if (craving >= 100 && !jhComplete) {
    triggerReincarnation('\ud83d\udc37 Pig', 'You chased the bliss and lost yourself!', 'bliss');
    return;
  }
}

function playWarmBellHarmonic() {
  if (!audioCtx) return;
  var now = audioCtx.currentTime;
  // Warm bell: gentle sine harmonics with slow pan feel
  var baseFreq = 220 + Math.random() * 220;
  [1, 1.5, 2, 2.5, 3].forEach(function(ratio, i) {
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = baseFreq * ratio;
    var g = audioCtx.createGain();
    var vol = 0.04 / (i + 1) * jh3WaveIntensity;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, now + 2.5 + i * 0.3);
    o.connect(g);
    g.connect(sfxGain);
    o.start(now + i * 0.08);
    o.stop(now + 3 + i * 0.3);
  });
}

// ======================================================================
// 4TH JHANA — BREATH PENDULUM (Perfect Balance)
// ======================================================================

function updateJhana4(dt) {
  jhTimer += dt;
  if (jhComplete) return;

  // Natural gravity pulls pendulum toward center
  // Angular acceleration = -g/L * sin(angle), simplified
  var gravity = 1.8;
  jh4Velocity += -gravity * jh4Angle * dt;

  // Slight natural drift to keep it interesting
  jh4Velocity += Math.sin(jhTimer * 0.3) * 0.02 * dt;

  // Damping — very slight so it doesn't just stop on its own
  jh4Velocity *= (1 - 0.15 * dt);

  // Input — gentle taps to correct
  var inputForce = 0;
  var inputThisFrame = false;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { inputForce -= 1; inputThisFrame = true; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { inputForce += 1; inputThisFrame = true; }

  if (inputThisFrame) {
    // Each input adds force, but pressing too hard = bigger swings
    var pushStrength = 0.6 + jh4InputCount * 0.25; // stronger with more inputs
    jh4Velocity += inputForce * pushStrength * dt * 8;
    jh4InputCount = Math.min(jh4InputCount + dt * 4, 10);
  }

  // Input count decays when not pressing
  if (!inputThisFrame) {
    jh4InputCount = Math.max(jh4InputCount - dt * 0.8, 0);
  }

  // Too many recent inputs destabilize: add wobble
  if (jh4InputCount > 4) {
    jh4Velocity += (Math.random() - 0.5) * (jh4InputCount - 4) * 0.3 * dt;
  }

  // Integrate
  jh4Angle += jh4Velocity * dt;

  // Check balance: angle near zero and velocity near zero
  var absAngle = Math.abs(jh4Angle);
  var absVel = Math.abs(jh4Velocity);
  if (absAngle < 0.04 && absVel < 0.08 && jh4InputCount < 2) {
    jh4BalanceTimer += dt;
  } else {
    jh4BalanceTimer = Math.max(jh4BalanceTimer - dt * 0.5, 0);
  }

  // Heartbeat — loud when unbalanced, fades to near silence when balanced
  jh4HeartbeatVol = 0.01 + (Math.min(absAngle, 0.5) / 0.5) * 0.06;
  jh4HeartbeatTimer += dt;
  if (jh4HeartbeatTimer > (absAngle < 0.04 ? 2.0 : 0.9)) {
    jh4HeartbeatTimer = 0;
    playHeartbeat(jh4HeartbeatVol);
  }

  // Music fades as balance improves
  if (musicGain) {
    var targetMusicVol = 0.3 * Math.min(absAngle * 5, 1);
    musicGain.gain.value += (targetMusicVol - musicGain.gain.value) * dt * 2;
  }

  // Completion: sustained perfect balance
  if (jh4BalanceTimer >= 14 && !jhComplete) {
    jhComplete = true;
    if (musicGain) musicGain.gain.value = 0;
    playSfx('bell');
    showDialogue(['Neither pleasure nor pain.', 'Balance.']);
    dialogueQueue.push('__COMPLETE_JH4__');
  }

  // Failure: swung way too far
  if (Math.abs(jh4Angle) > 1.2 && !jhComplete) {
    triggerReincarnation('\u2696\ufe0f Pendulum', 'The mind swung out of control!', 'imbalance');
    return;
  }
}

function playHeartbeat(vol) {
  if (!audioCtx) return;
  var now = audioCtx.currentTime;
  // Double thump: lub-dub
  [0, 0.15].forEach(function(offset) {
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(offset === 0 ? 55 : 45, now + offset);
    o.frequency.exponentialRampToValueAtTime(30, now + offset + 0.12);
    var g = audioCtx.createGain();
    var v = offset === 0 ? vol : vol * 0.6;
    g.gain.setValueAtTime(0, now + offset);
    g.gain.linearRampToValueAtTime(v, now + offset + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.15);
    o.connect(g);
    g.connect(sfxGain);
    o.start(now + offset);
    o.stop(now + offset + 0.2);
  });
}

function updateArupa(dt) {
  arupaTimer += dt;
  if (currentLevel === 9) updateInfiniteSpace(dt);
  else if (currentLevel === 10) updateInfiniteConsciousness(dt);
  else if (currentLevel === 11) updateNothingness(dt);
  else if (currentLevel === 12) updateNeitherNor(dt);
}

function updateInfiniteSpace(dt) {
  arupa1Speed += dt * 0.3;
  var rSpeed = arupa1Speed * 80 * dt;
  var moved = false;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { accReticleX -= rSpeed; moved = true; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { accReticleX += rSpeed; moved = true; }
  if (keys['ArrowUp'] || keys['w'] || keys['W']) { accReticleY -= rSpeed; moved = true; }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) { accReticleY += rSpeed; moved = true; }
  // SPACE = settle into stillness
  if (interactJustPressed && !moved) arupa1StillTimer += 2;
  if (!moved) arupa1StillTimer += dt; else { arupa1StillTimer = 0; craving += dt; }
  if (arupa1StillTimer >= 8 && !arupaComplete) {
    arupaComplete = true; playSfx('bell');
    showDialogue(['You stop chasing boundaries.', 'Space has no edge, and you are space.', 'Let it be infinite.']);
    dialogueQueue.push('__COMPLETE_AR1__');
  }
}

function updateInfiniteConsciousness(dt) {
  var rSpeed = 80 * dt;
  var mdx = 0, mdy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) mdx -= rSpeed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) mdx += rSpeed;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) mdy -= rSpeed;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) mdy += rSpeed;
  var moved = mdx !== 0 || mdy !== 0;
  for (var ci = 0; ci < arupa2Copies.length; ci++) { arupa2Copies[ci].x += mdx; arupa2Copies[ci].y += mdy; }
  accReticleX += mdx; accReticleY += mdy;
  // SPACE = merge toward center
  if (interactJustPressed && !moved) arupa2MergeTimer += 1.5;
  if (!moved) arupa2MergeTimer += dt; else arupa2MergeTimer = Math.max(arupa2MergeTimer - dt * 0.3, 0);
  if (arupa2MergeTimer > 3) {
    for (var ci2 = 0; ci2 < arupa2Copies.length; ci2++) {
      arupa2Copies[ci2].x += (accReticleX - arupa2Copies[ci2].x) * 0.5 * dt;
      arupa2Copies[ci2].y += (accReticleY - arupa2Copies[ci2].y) * 0.5 * dt;
    }
  }
  var allMerged = arupa2MergeTimer > 5;
  for (var ci3 = 0; ci3 < arupa2Copies.length; ci3++) {
    if (Math.abs(arupa2Copies[ci3].x - accReticleX) > 10 || Math.abs(arupa2Copies[ci3].y - accReticleY) > 10) allMerged = false;
  }
  if (allMerged && !arupaComplete) {
    arupaComplete = true; playSfx('bell');
    showDialogue(['All selves are one.', 'Consciousness recognizes itself.']);
    dialogueQueue.push('__COMPLETE_AR2__');
  }
}

function updateNothingness(dt) {
  arupa3PlayerAlpha = Math.max(arupa3PlayerAlpha - 0.02 * dt, 0.05);
  var moved = false;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) moved = true;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) moved = true;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) moved = true;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) moved = true;
  // SPACE = release, let go further
  if (interactJustPressed && !moved) { arupa3StillTimer += 2; arupa3PlayerAlpha = Math.max(arupa3PlayerAlpha - 0.1, 0.05); }
  if (!moved) arupa3StillTimer += dt;
  else { arupa3StillTimer = Math.max(arupa3StillTimer - dt * 0.5, 0); arupa3PlayerAlpha = Math.min(arupa3PlayerAlpha + 0.05 * dt, 0.5); craving += dt * 0.5; }
  if (arupa3StillTimer >= 10 && !arupaComplete) {
    arupaComplete = true; playSfx('bell');
    showDialogue(['There is nothing to find.', 'And no one searching.', 'Even nothing dissolves.']);
    dialogueQueue.push('__COMPLETE_AR3__');
  }
}

function updateNeitherNor(dt) {
  arupaTimer += dt;
  arupa4Flicker = Math.random();
  var inputWorks = Math.sin(gameTime * 7.3 + 13.7) > 0;
  var anyInput = false;
  if (inputWorks) {
    if (keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown'] ||
        keys['a'] || keys['d'] || keys['w'] || keys['s']) anyInput = true;
  }
  if (interactJustPressed) { anyInput = true; craving += 2; }
  if (!anyInput) arupa4AcceptTimer += dt; else arupa4AcceptTimer = Math.max(arupa4AcceptTimer - dt * 0.3, 0);
  if (arupa4AcceptTimer >= 12 && !arupaComplete) {
    arupaComplete = true; playSfx('bell');
    showDialogue(['Neither perception nor non-perception.', 'The boundary of mind itself.', 'Barely known. Barely gone.']);
    dialogueQueue.push('__COMPLETE_AR4__');
  }
}

function startCessation() {

// Phase 0: buildup (4s) — visual noise/flicker/sound instability
// Phase 1: freeze (wait SPACE) — everything stops, "Let go." appears
// Phase 2: flash (0.5s) — white flash to blank
// Phase 3: rest (5s) — grey stillness, ambient breath
// Phase 4: return — set enlightened, return to monastery
function updateCessation(dt) {
  cessationTimer += dt;
  if (cessationPhase === 0) {
    // Buildup — increasing visual disruption
    if (cessationTimer >= 4.0) { cessationPhase = 1; cessationTimer = 0; }
  } else if (cessationPhase === 1) {
    // Freeze — wait for "Let go" press
    if (cessationTimer >= 1.5 && interactJustPressed) {
      cessationPhase = 2; cessationTimer = 0;
      playSfx('bell');
    }
  } else if (cessationPhase === 2) {
    // Flash — brief white then blank
    if (cessationTimer >= 0.5) { cessationPhase = 3; cessationTimer = 0; }
  } else if (cessationPhase === 3) {
    // Rest — grey stillness
    fruitionRestTimer += dt;
    if (fruitionRestTimer >= 5.0) { cessationPhase = 4; cessationTimer = 0; }
  } else if (cessationPhase === 4) {
    awakened = true;
    startAwakening();
  }
}

function startAwakening() {
  enlightened = true;
  setupLevel(0);
  gameState = 'playing';
  playSfx('bell');
}

// MEDITATION UPDATE
// ======================================================================

function updateMeditation(dt) {
  medTimer += dt;
  medThoughtTimer += dt;

  // Harder meditation: faster spawns, more thoughts, bigger hit radius, less passive regen
  const progress = medTimer / medDuration;
  const spawnBase = currentLevel === 2 ? 0.5 : (currentLevel === 0 ? 0.9 : 0.4);
  // Spawn rate accelerates as meditation progresses
  const spawnRate = spawnBase * (1 - progress * 0.4);
  if (medThoughtTimer > spawnRate) {
    medThoughtTimer = 0;
    spawnThought();
    // Spawn a second thought occasionally in later portion
    if (progress > 0.4 && Math.random() < 0.3) spawnThought();
  }

  thoughtParticles = thoughtParticles.filter(t => {
    // Thoughts speed up as they get closer — attracted to monk
    const tdx = player.x - t.x;
    const tdy = player.y - t.y;
    const td = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
    // Gentle homing
    t.vx += (tdx / td) * 0.15 * dt * 60;
    t.x += t.vx * 60 * dt;
    t.y += Math.sin(gameTime * 3 + t.x * 0.05) * 0.7;
    t.life -= dt * 0.25;

    const d = Math.sqrt((t.x - player.x) ** 2 + (t.y - player.y) ** 2);
    if (d < 35) {
      focus = Math.max(focus - 8, 0);
      playSfx('focus_loss');
      t.life = 0;
    }
    return t.life > 0;
  });

  if (interactJustPressed) {
    focus = Math.min(focus + 5, 100);
    thoughtParticles.forEach(t => {
      const tdx = t.x - player.x;
      const tdy = t.y - player.y;
      const td = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
      t.vx += (tdx / td) * 3;
      t.life -= 0.3;
    });
    playSfx('chime');
  }

  // Slower passive focus recovery
  focus = Math.min(focus + 1 * dt, 100);

  // Insight meditation failure — shadow consumed you
  if (currentLevel === 2 && !rainySeasonActive && focus <= 0) {
    medActive = false;
    shadowActive = false;
    thoughtParticles = [];
    triggerReincarnation('🦎 Gecko', 'Lost in shadows — clinging to the wall of self!', 'sloth');
    return;
  }

  if (currentLevel === 2 && !rainySeasonActive && medTimer > 3 && !shadowActive) {
    shadowActive = true;
    shadowX = player.x + 100;
    shadowY = player.y;
  }
  updateShadow(dt);

  if (medTimer >= medDuration) {
    medActive = false;
    thoughtParticles = [];

    if (currentLevel === 0) {
      // Level 0 uses breathing meditation now, not this path
    } else if (currentLevel === 2 && rainySeasonActive) {
      rainyMedDone = true;
      showDialogue(["Dawn breaks through the rain.", "*The long night is over.", "...The mind, like still water after a storm, is clear."]);
      dialogueQueue.push('__COMPLETE_RAIN__');
      playSfx('bell');
    } else if (currentLevel === 2) {
      level3MedDone = true;
      shadowActive = false;
      showDialogue(["*The shadow fades.", "...It was never separate from me.", "*Things arise and pass."]);
      dialogueQueue.push('__START_RAIN__');
      playSfx('bell');
    }
  }
}

// ======================================================================

function updateEatingGame(dt) {
  eatingTimer += dt;

  if (eatingShowResult > 0) {
    eatingShowResult -= dt;
    if (eatingShowResult <= 0) {
      eatingRound++;
      nextEatingRound();
    }
    return;
  }

  if (!eatingWaitingForKey && eatingTimer >= eatingTargetTime) {
    eatingWaitingForKey = true;
    eatingPrompt = 'Press SPACE now \u2014 mindfully.';
    eatingTargetTime = eatingTimer;
  }

  // Punish pressing too early (before prompt appears)
  if (!eatingWaitingForKey && interactJustPressed && eatingTimer < eatingTargetTime && eatingShowResult <= 0) {
    eatingPrompt = 'Too fast! Eat mindfully. (' + (eatingRound + 1) + '/' + eatingTotalRounds + ')';
    playSfx('focus_loss');
    eatingShowResult = 0.8;
    eatingWaitingForKey = false;
    return;
  }

  if (eatingWaitingForKey && interactJustPressed) {
    const reactionTime = eatingTimer - eatingTargetTime;
    if (reactionTime < 1.5) {
      eatingScore++;
      eatingPrompt = 'Mindful. (' + (eatingRound + 1) + '/' + eatingTotalRounds + ')';
      playSfx('pickup');
    } else {
      eatingPrompt = 'Missed the moment. (' + (eatingRound + 1) + '/' + eatingTotalRounds + ')';
      playSfx('focus_loss');
    }
    eatingShowResult = 0.8;
    eatingWaitingForKey = false;
  }

  if (eatingWaitingForKey && (eatingTimer - eatingTargetTime) > 2.5) {
    eatingPrompt = 'Missed. (' + (eatingRound + 1) + '/' + eatingTotalRounds + ')';
    playSfx('focus_loss');
    eatingShowResult = 0.8;
    eatingWaitingForKey = false;
  }
}

function startTransition(text, callback) {
  transitionAlpha = 0;
  transitionDir = 1;
  transitionText = text;
  transitionCallback = callback;
  transitionHoldTimer = 0;
  gameState = 'transition';
}

function updateTransition(dt) {
  if (transitionDir === 1) {
    transitionAlpha += dt * 0.8;
    if (transitionAlpha >= 1) {
      transitionAlpha = 1;
      transitionDir = 0; // hold
      transitionHoldTimer = 0;
      if (transitionCallback) {
        transitionCallback();
        transitionCallback = null;
      }
      gameState = 'transition'; // keep in transition for fade-out
    }
  } else if (transitionDir === 0) {
    transitionHoldTimer += dt;
    if (transitionHoldTimer >= 3.5) {
      transitionDir = -1;
    }
  } else if (transitionDir === -1) {
    transitionAlpha -= dt * 0.8;
    if (transitionAlpha <= 0) {
      transitionAlpha = 0;
      transitionText = '';
      gameState = 'playing';
    }
  }
}
